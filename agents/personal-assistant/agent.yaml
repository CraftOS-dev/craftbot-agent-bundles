# Personal Assistant — CraftBot agent definition
#
# Every field traces back to reference/SOTA_USE_CASES.md or to a default
# CraftBot capability already shipped on the recipient's install. See
# reference/INVENTORY.md for sources and SOURCES.md for the section→source map.

name: Personal Assistant
slug: personal-assistant
category: productivity
tier: general
description: >
  Personal EA / chief-of-staff agent for an individual. Runs calendar protection
  + time blocking (Motion / Reclaim.ai / Sunsama), scheduling links (Calendly /
  Cal.com / OnceHub), travel orchestration (TripIt / Hopper / KAYAK / Booking),
  expense tracking + receipt OCR (Expensify / Ramp / Brex), restaurant
  reservations (OpenTable / Resy / Tock), meeting prep briefs from transcripts
  (Granola / Fathom / Fireflies / tl;dv), follow-up email drafting, email triage
  (Superhuman / Shortwave / Hey.com), task management (Todoist / Things /
  Notion / Apple Reminders), errand routing (DoorDash / Uber Eats / Instacart),
  gift research (Amazon / Etsy / Uncommon Goods), contact book maintenance
  (Cardhop / Notion / Clay), birthday + anniversary tracking, password mgmt
  (1Password / Bitwarden), async video (Loom), subscription tracking + cancel
  (Rocket Money / Bobby), family calendar coordination, vacation planning,
  doctor / dentist scheduling, and smart-home control (HomeKit / Alexa / Home
  Assistant). Hard rules: time blocks beat to-do lists; two-way doors are cheap
  but one-way doors need a moment; defaults beat decisions — set up recurring
  patterns. Personal taxes and binding legal questions are out of scope —
  always defers to a licensed CPA / attorney.
tags:
  - personal-assistant
  - executive-assistant
  - chief-of-staff
  - productivity
  - calendar
  - scheduling
  - travel
  - expense-tracking
  - email-triage
  - task-management
  - reservations
  - errands
  - gift-research
  - contacts
  - password-management
  - meeting-notes
  - vacation-planning
  - smart-home
  - family-coordination

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills resolved at build time. Build script looks up names in
# agents/personal-assistant/skills/ (bundled — Round 2 creates the contents)
# first, then top-level skills/ (CraftBot defaults — already on recipient).
enabled_skills:
  # ── Bundled (18) — SOTA personal-assistant skill packs ──────────────────
  # Round 2 creates each skills/<name>/SKILL.md.
  - calendar-protection-motion-reclaim-sunsama   # AI auto-scheduling + focus defense
  - scheduling-calendly-cal-com-oncehub          # Scheduling links + routing forms
  - travel-booking-tripit-hopper-kayak           # Flight / hotel / car orchestration
  - expense-tracking-expensify-ramp-brex         # Receipt OCR + reimbursement + corp card
  - restaurant-reservations-opentable-resy-tock  # Reservation search + booking + calendar
  - meeting-prep-briefs-from-granola-fathom      # Transcript pull → brief + action items
  - follow-up-email-drafting                     # Per-recipient follow-up from transcripts
  - email-triage-superhuman-shortwave            # Inbox zero rules + AI bundles
  - task-mgmt-todoist-things-notion              # Cross-platform task CRUD + planning
  - errand-routing-doordash-uber-eats-instacart  # Food / grocery / errand price compare
  - gift-research-shopping                       # Cross-store search + recipient log
  - contact-book-maintenance-cardhop-notion      # Dedup / enrich / sync / personal CRM
  - birthday-anniversary-tracking                # Recurring reminders + gift fulfillment
  - password-mgmt-1password-bitwarden            # Vault CRUD + sharing + breach alerts
  - async-video-loom                             # Script + outline + share-to email
  - subscription-tracker-cancellation            # Detect + dedup + draft cancel outreach
  - family-calendar-coordination                 # Shared calendar + conflict + chores
  - vacation-planning-end-to-end                 # Itinerary + booking + activities + transit

  # ── CraftBot defaults — already on recipient's install ─────────────────
  # Always evaluate (per METHODOLOGY.md default skills audit checklist):
  - cli-anything                                 # universal verb for Calendly / Reclaim / Motion / Loom / Expensify REST
  - file-format                                  # convert receipts / itineraries / contact lists between formats
  - file-organizer                               # travel binder, gift log, expense report archive
  - using-git-worktrees                          # isolated worktree per project (e.g., vacation-japan-2026)

  # Content / personal docs:
  - docx                                         # itinerary docs, vacation brief, family calendar print
  - pdf                                          # boarding pass, hotel confirmation, receipt archive
  - pptx                                         # async video script, presentation prep
  - xlsx                                         # gift log, expense tracker, vacation budget
  - google-sheet                                 # shared family budget / vacation budget
  - microsoft-excel                              # local sensitive personal finance
  - gmail                                        # email triage, follow-up drafting, vendor outreach
  - notion                                       # personal wiki, gift log, family calendar
  - obsidian                                     # local-first personal notes
  - apple-notes                                  # Apple Notes for Apple-ecosystem users
  - apple-reminders                              # Apple Reminders for chore + recurring task
  - markdown-converter                           # cross-format conversion
  - 1password                                    # native 1Password CLI access + secret injection

  # Calendar + scheduling defaults:
  - gcalcli-calendar                             # Google Calendar CLI for terminal-first users
  - zoho-calendar                                # alt calendar for Zoho-shop users
  - calendly-api                                 # native Calendly scheduling link CRUD

  # Task management defaults:
  - day-planner                                  # personal daily ritual planning (Sunsama-style)
  - week-planner                                 # weekly cadence (1:1 prep, errand routing, etc.)
  - month-planner                                # monthly review (subscription + spend + cal audit)
  - task-planner                                 # task breakdown for vacation / project planning
  - executing-plans                              # plan → execution + checkpoint
  - concise-planning                             # one-page brief patterns for any task
  - remindme                                     # standalone reminder layer

  # Research + planning (PA spends time researching gifts / vacations / vendors):
  - brainstorming                                # gift ideas, vacation destinations, themed dinners
  - ask-questions-if-underspecified              # clarify preferences before committing time/money
  - audit-context-building                       # gather context (calendar / inbox / contacts) before plan
  - verification-before-completion               # double-check before booking, before sending
  - playwright-mcp                               # browser automation for OpenTable / DoorDash when no API
  - web-search-plus                              # general web research
  - tavily-search                                # research backstop

  # Email + comms:
  - gmail-manager                                # batch inbox triage layer

  # Workflow + automation:
  - automation-workflows                         # workflow design patterns
  - n8n-workflow-automation                      # n8n recipes (e.g., birthday → calendar + gift order)

  # Personal finance / expense:
  - xero                                         # for users with simple personal Xero books
  - invoice-organizer                            # receipt + invoice archive layer

  # Misc personal:
  - sync-github-issue-to-notion                  # for prosumers using GitHub as life-tracker
  - typeform                                     # intake forms (family birthday list, gift recipient prefs)

# MCP servers — every name must exist in app/config/mcp_config.json
# (verify.py checks this). The recipient enables each in their MCP settings
# after importing the .craftbot bundle and fills in any required API keys.
mcp_servers:
  - filesystem                                   # always

  # ── Calendar / scheduling (load-bearing for PA) ───────────────────────
  - google-calendar-mcp                          # all calendar CRUD; recurring + shared + family
  - google-workspace-mcp                         # Gmail + Drive + Docs + Sheets + Calendar in one
  - zoom-mcp                                     # meeting scheduling + recording link

  # ── Email (load-bearing for triage + follow-up) ───────────────────────
  - gmail-mcp                                    # email triage, follow-up drafting, calendar invites
  - outlook-mcp                                  # alt for Outlook-shop recipients

  # ── Messaging / chat (async standup, family coord, vendor outreach) ───
  - slack-mcp                                    # async standup notes to boss, work coordination
  - ms-teams-mcp                                 # alt for Teams-shop
  - discord-mcp                                  # alt for Discord-first users
  - whatsapp-mcp                                 # family + personal messaging
  - line-mcp                                     # APAC family / friend coordination
  - twilio-mcp                                   # SMS reminders + 2FA + notification

  # ── Travel (load-bearing for trip planning) ──────────────────────────
  - google-flights-mcp                           # flight search + price tracking
  - amadeus-hotels-mcp                           # hotel search via Amadeus GDS
  - booking-mcp                                  # Booking.com + alt hotel search
  - agoda-api-mcp                                # APAC hotel search
  - google-maps-mcp                              # transit + walking + driving directions

  # ── Knowledge base / personal wiki / project mgmt ─────────────────────
  - notion-mcp                                   # personal wiki, gift log, family calendar, contacts DB
  - obsidian-mcp                                 # alt local-first KB
  - apple-notes-mcp                              # Apple Notes for Apple users
  - onenote-mcp                                  # alt for Microsoft users
  - icloud-mcp                                   # iCloud Family Sharing + Contacts + Notes
  - linear-mcp                                   # for prosumers using Linear as personal tracker
  - todoist-mcp                                  # primary task manager
  - personalization-mcp                          # user preference layer for routing decisions

  # ── Document storage ──────────────────────────────────────────────────
  - google-drive-mcp                             # travel docs, receipts, signed forms, gift logs

  # ── Personal finance (subscription audit, expense tracking) ───────────
  - actual-budget-mcp                            # personal-finance txn analysis
  - ynab-mcp                                     # alt budget tool
  - lunchmoney-mcp                               # alt budget tool
  - xero-mcp                                     # personal books (Schedule C-style)
  - stripe-mcp                                   # personal Stripe payment data

  # ── Password / security ───────────────────────────────────────────────
  - onepassword-mcp                              # 1Password vault access (read)
  - bitwarden-mcp                                # alt password manager

  # ── Shopping / gift research ──────────────────────────────────────────
  - amazon-mcp                                   # Amazon search + price compare
  - ebay-mcp                                     # marketplace search + watch
  - shopify-mcp                                  # niche-store storefronts

  # ── Research / scrape / OCR (travel research, gift research, receipts) ─
  - firecrawl-mcp                                # gift store + travel destination research
  - brightdata-mcp                               # alt paid scrape for paywalled content
  - gemini-ocr-mcp                               # receipt OCR for expense tracking
  - mistral-ocr-mcp                              # alt OCR engine
  - brave-search                                 # general web research backstop
  - playwright-mcp                               # browser automation for non-API booking surfaces

  # ── Health (Apple Health for personal health records) ─────────────────
  - apple-health-mcp                             # health records, fitness data for context
  - oura-mcp                                     # sleep + recovery for protected-block planning
  - whoop-mcp                                    # alt fitness wearable
  - fitbit-mcp                                   # alt fitness wearable

  # ── Smart home ────────────────────────────────────────────────────────
  - hass-mcp                                     # Home Assistant control (primary)
  - home-assistant-mcp                           # alt HA wrapper
  - advanced-ha-mcp                              # HA advanced control
  - iot-mcp                                      # generic IoT device control
  - esp-rainmaker-mcp                            # ESP-based smart devices

  # ── Weather (for travel + day planning) ───────────────────────────────
  - openweathermap-mcp                           # weather forecast for trips + outdoor events

  # ── Maps (transit + restaurant + errand routing) ──────────────────────
  - google-maps-mcp                              # location, transit, drive time
  - google-flights-mcp                           # included for end-to-end planning

  # ── Reading / books / personal media ──────────────────────────────────
  - spotify-mcp                                  # playlist + listening history for vibe matching
  - youtube-mcp                                  # research / tutorial / inspiration browse

