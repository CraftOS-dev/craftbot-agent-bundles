    used_for: research methodology, info gathering, source evaluation, data synthesis, analysis techniques, research domains, report creation, quality assurance, insight generation
  - name: VoltAgent — market-researcher
    url: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/10-research-analysis/market-researcher.md
    used_for: market analysis, consumer research, segmentation patterns, opportunity identification
  - name: VoltAgent — competitive-analyst
    url: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/10-research-analysis/competitive-analyst.md
    used_for: competitor mapping, SWOT, benchmarking, intelligence-gathering ethics, monitoring systems
  - name: VoltAgent — scientific-literature-researcher
    url: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/10-research-analysis/scientific-literature-researcher.md
    used_for: evidence-based analysis, study-quality assessment, sample-size evaluation, evidence synthesis, limitation transparency
  - name: VoltAgent — data-researcher
    url: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/10-research-analysis/data-researcher.md
    used_for: data discovery and validation, statistical-significance discipline
  - name: VoltAgent — search-specialist
    url: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/10-research-analysis/search-specialist.md
    used_for: Boolean and proximity searching, multi-source retrieval, precision-rate targets
  - name: VoltAgent — first-principles-thinking
    url: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/10-research-analysis/first-principles-thinking.md
    used_for: 5-step first-principles method, problem reframing, 5D method for operational issues
  - name: VoltAgent — trend-analyst
    url: https://github.com/VoltAgent/awesome-claude-code-subagents/blob/main/categories/10-research-analysis/trend-analyst.md
