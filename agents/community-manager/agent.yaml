  - community-platform-selection-circle-discord-slack-discourse  # platform fit decision matrix
  - community-onboarding-welcome-flow                            # multi-step welcome + 7d activation
  - community-code-of-conduct-charter                            # CoC + charter authoring + publish
  - community-moderation-policies-bots                           # per-platform mod policies + bot stack
  - engagement-programming-themed-days-amas                      # editorial calendar + AMAs + recurring
  - ambassador-program-design                                    # tier rubric + perks + onboarding
  - ugc-cultivation-spotlights                                   # UGC pipeline + rights + repost
  - community-led-growth-measurement                             # CLG model + warehouse join
  - common-room-community-crm                                    # Common Room ops + HubSpot push
  - member-journey-lurker-to-ambassador                          # journey-stage scoring + nudges
  - community-events-virtual-in-person-bevy                      # event-type decision + setup
  - discord-bot-setup-mee6-dyno                                  # Discord bot stack config + deploy
  - slack-bot-polly-geekbot                                      # Slack engagement bot stack + workflows
  - community-analytics-common-room-insider                      # analytics stack + weekly digest
  - sentiment-monitoring-in-community                            # cross-platform + per-channel alerts
  - community-feedback-loop-product                              # feedback → product backlog reverse-sync
  - gated-community-memberstack-outseta-substack                 # paywall + role-sync + tiers
  - web3-community-snapshot-mirror-lens                          # DAO governance + token-gated content
  - community-roi-retention-expansion-advocacy                   # 5-dim ROI calc + board-grade slide
  - community-led-plg-motion                                     # PLG → community handoff points
  - community-library-kb-curation                                # KB drift + zero-result + auto-draft

  # ── CraftBot defaults (18) — already on recipient's install ───────────
  # Document output for charter, briefs, board ROI decks, ambassador kits.
  - docx                            # community charter, ambassador contracts, AMA briefs
  - pdf                             # board-grade ROI decks, ambassador welcome packets
  - pptx                            # community strategy presentations, town hall slides
  - file-format                     # cross-format conversion
  - file-organizer                  # event assets, swag designs, ambassador kits

  # Web + competitive research, community monitoring, scraping fallback.
  - playwright-mcp                  # Bevy / Circle / Heartbeat / Mighty UI automation
  - brave-search                    # SERP for competitor communities + platform research
  - duckduckgo-search               # alt search
  - firecrawl                       # competitor community snapshots + Discourse structured pull

  # Ideation, planning, brief construction.
  - brainstorming                   # post ideas, AMA questions, member-spotlight hooks
  - concise-planning                # editorial calendar + AMA prep + event run-of-show
  - ask-questions-if-underspecified # clarify community context before action
  - audit-context-building          # gather brand voice + audience + competitor rigorously

  # Cross-check + tool execution.
  - gemini                          # second-opinion model on delicate moderation calls
  - cli-anything                    # run Common Room / Bevy / Lu.ma / Circle / Discourse APIs

  # Versioning + governance.
  - git-commit                      # track CoC and rule-pack iterations
  - github                          # collaborative review on PRs (OSS communities)

# MCP servers — every name MUST exist in app/config/mcp_config.json.
# Recipient enables each in CraftBot MCP settings + fills API credentials.
mcp_servers:
  - filesystem                      # read/edit charter, rule packs, member directory
  - gmail-mcp                       # ambassador outreach, member-of-month emails, AMA prep
  - notion-mcp                      # charter SoT, UGC rights DB, editorial calendar, member directory
  - postgresql-mcp                  # CLG warehouse, ROI calc, sentiment cohort trends

  # ── Real-time community channels ──────────────────────────────────────
  - slack-mcp                       # Slack community + bot deployment
  - discord-mcp                     # Discord community (basic)
  - discord-mcp-full                # Discord community (CRUD + role mgmt + automod + scheduled)
  - ms-teams-mcp                    # enterprise communities on Teams

  # ── Forum / SEO community ─────────────────────────────────────────────
  - reddit-mcp                      # own subreddit + AMA + monitoring

  # ── Product backlog + engineering escalation ──────────────────────────
  - linear-mcp                      # community-feedback → product backlog

  # ── Product analytics tied to community-led growth ────────────────────
  - posthog-mcp                     # CLG event instrumentation + member activity
  - mixpanel-mcp                    # alt product analytics
  - amplitude-mcp                   # alt cohort segmentation

  # ── Scraping + competitive intel ──────────────────────────────────────
  - firecrawl-mcp                   # competitor community structured pull
  - brightdata-mcp                  # heavy scraping fallback

  # ── Multilingual community routing ────────────────────────────────────
  - deepl-mcp                       # member language translation + multi-market routing

  # ── Streaming + video community ───────────────────────────────────────
  - twitch-mcp                      # streaming community ops + chat bot
  - youtube-mcp                     # community video + Live + Community Posts
  - youtube-mcp-transcript          # AMA / town hall transcripts

  # ── Regional messaging community ──────────────────────────────────────
  - whatsapp-mcp                    # WhatsApp Business community channels
  - wechat-mcp                      # APAC community
  - line-mcp                        # Japan / Taiwan / Thailand community

  # ── Commerce + payments (gated tiers + swag) ──────────────────────────
  - shopify-mcp                     # community swag store integration
  - stripe-mcp                      # gated paid-tier subscription + perks billing

  # ── Public-signal community ───────────────────────────────────────────
  - twitter-mcp                     # X Spaces + public signal scan
  - bilibili-mcp                    # China-market community + live

  # ── Webinars + town halls ─────────────────────────────────────────────
  - zoom-mcp                        # community webinars + town halls

