# Document Automation — CraftBot agent definition
#
# Every field traces back to web-sourced SOTA research summarized in
# reference/SOTA_USE_CASES.md (per-use-case mapping) and SOURCES.md
# (section-to-source map). Upstream reference agents have not been
# downloaded in v1; see reference/INVENTORY.md.

name: Document Automation
slug: docgen-automation
category: operations
tier: specialized
description: >
  Document automation operator for contracts, proposals, RFPs, smart forms,
  and bulk doc generation. Authors and versions templates (MSA / NDA /
  proposal / RFP / customer T&C / employment); ships conditional-logic
  doc assembly (Documate / HotDocs / Docassemble); wires e-signature
  pipelines (DocuSign / Adobe Sign / PandaDoc / Dropbox Sign); runs AI
  doc extraction (Hyperscience / Rossum / AWS Textract / Azure Document
  Intelligence / Google Document AI); integrates with CLM (Ironclad /
  ContractWorks / LinkSquares / Evisort); generates Salesforce + HubSpot
  proposals (Conga Composer / PandaDoc); handles bulk doc gen from CSV;
  enforces brand consistency (Templafy + Vale); produces PDF/UA accessible
  output. Defers binding contract language to legal-counsel, revenue /
  pricing decisions to finance-controller, CPQ rule design to sales-ops.

tags:
  - document-automation
  - templates
  - contracts
  - proposals
  - rfp
  - e-signature
  - docusign
  - pandadoc
  - adobe-sign
  - clm
  - ironclad
  - conga-composer
  - hubspot-quotes
  - hyperscience
  - rossum
  - textract
  - azure-document-intelligence
  - templafy
  - documate
  - hotdocs
  - docassemble
  - jotform
  - formstack
  - bulk-document-gen
  - redaction
  - pdf-accessibility
  - clause-extraction
  - multilingual-templates

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills are resolved at build time:
#   1. agents/docgen-automation/skills/<name>/  (bundled — ships INSIDE the .craftbot)
#   2. <repo>/skills/<name>/                    (CraftBot default — already on recipient's install)
#   A missing skill (in neither location) causes a build error.
enabled_skills:
  # ── Bundled (24) — SOTA doc-automation skill packs we ship with this agent ─
  # Round 2 will populate each folder under agents/docgen-automation/skills/<name>/
  # with a SKILL.md. The names below are reserved and referenced from soul.md /
  # role.md / SOTA_USE_CASES.md.
  - contract-template-authoring-msa-nda             # MSA / NDA / employment / customer T&C template authoring
  - proposal-automation-pandadoc-proposify-qwilr    # PandaDoc / Proposify / Qwilr proposal platforms
  - rfp-response-loopio-rfpio-responsive            # Loopio / Responsive (RFPIO) / Qvidian / Arphie
  - conditional-logic-doc-assembly                  # Documate / HotDocs / Docassemble if-then clause engine
  - e-signature-docusign-adobe-sign-pandadoc        # DocuSign / Adobe Sign / PandaDoc / Dropbox Sign
  - e-sign-compliance-ueta-esign-eidas              # UETA / ESIGN Act / eIDAS 2.0 compliance
  - ai-doc-extraction-hyperscience-rossum-textract  # Hyperscience / Rossum / Textract / Azure DI / Document AI
  - receipt-invoice-extraction-veryfi-mindee        # Veryfi / Mindee / Klippa / Nanonets
  - template-library-templafy-brand                 # Templafy / Brandfolder / Frontify + brand lint
  - clm-ironclad-contractworks-integration          # Ironclad / ContractWorks / Lexion / LinkSquares / Evisort
  - salesforce-conga-composer                       # Conga Composer Salesforce doc gen
  - hubspot-doc-gen                                 # HubSpot Quotes + PandaDoc integration
  - document-workflow-routing-approval              # Multi-stage approval routing (legal → finance → exec)
  - audit-trail-e-sign-versioning                   # E-sign Certificate of Completion + version history
  - dynamic-pricing-variable-insertion              # Pricing tables + variable insertion (PandaDoc / Jinja2 / WeasyPrint)
  - smart-form-jotform-formstack                    # Jotform / Formstack / Typeform / Tally smart forms
  - redaction-automation-pii                        # Presidio / AWS Comprehend / Google DLP redaction
  - document-accessibility-pdf-ua                   # PDF/UA tagged PDF + WCAG 2.2 AA verification
  - bulk-document-gen-csv                           # DocSpring / PDFmonkey / docxtemplater bulk gen
  - ocr-paper-doc-extraction                        # Tesseract / PaddleOCR / Gemini OCR / Textract for paper
  - ai-summarization-clause-extraction              # Long-doc summarization + clause extraction
  - contract-redlining-automation                   # Spellbook / Robin AI / python-docx redlines
  - document-analytics-time-to-sign                 # DocuSign Connect + PandaDoc analytics + posthog
  - multilingual-template-generation                # DeepL + Lokalise + locale-specific templates

  # ── CraftBot defaults (24) — already on recipient's install ───────────────
  # Document I/O, file ops, research, writing assistance, automation.
  - cli-anything                                    # universal verb — install DocuSign SDK, Pandoc, WeasyPrint, Presidio, verapdf, ORT, curl any API
  - file-format                                     # convert .docx / .pdf / .md / .txt / .csv for doc intake
  - file-organizer                                  # organize a workspace of templates / source docs / executed contracts
  - docx                                            # produce Word output (master doc format for contracts)
  - pdf                                             # produce PDF output (default for signed docs)
  - nano-pdf                                        # lightweight PDF manipulation
  - pptx                                            # produce PowerPoint output (proposal decks)
  - markdown-converter                              # cross-convert markdown for source authoring
  - writing-skills                                  # writing discipline for contract / proposal language
  - writing-plans                                   # structured drafting plans for long-form docs
  - writing-assistant                               # collaborative drafting flow
  - typeform                                        # Typeform smart-form integration
  - n8n-workflow-automation                         # orchestrate doc-gen → approval → sign pipelines
  - notion                                          # archive executed docs + audit logs in Notion
  - gmail                                           # send drafts + executed docs to counterparties
  - outlook                                         # Microsoft alternative
  - google-drive                                    # template library + executed doc storage
  - google-sheets                                   # CSV data source for bulk doc gen + dynamic pricing
  - microsoft-excel                                 # Excel data source
  - slack                                           # approval-routing notifications
  - firecrawl                                       # scrape regulator pages (UETA / eIDAS / RON statutes)
  - prompt-engineering-expert                       # structure prompts to AI doc-extraction / summarization
  - verification-before-completion                  # quality-gate every doc before delivery
  - using-git-worktrees                             # isolate template-repo branches for clause iteration

# MCP servers — every name verified against app/config/mcp_config.json.
# The recipient enables each in MCP settings after import and fills in any
# required API keys.
mcp_servers:
  - filesystem                                      # read/write templates + source docs + executed contracts
  - gmail-mcp                                       # send drafts + executed docs
  - outlook-mcp                                     # Microsoft alternative
  - google-drive-mcp                                # store templates + executed docs in user's Drive
  - google-workspace-mcp                            # Docs (authoring) + Sheets (CSV / pricing) + Slides (proposal decks)
  - notion-mcp                                      # archive executed docs + audit logs
  - slack-mcp                                       # approval-routing notifications + completion alerts
  - ms-teams-mcp                                    # Teams alternative
  - aws-s3-mcp                                      # bulk document storage + signed URL delivery
  - firecrawl-mcp                                   # fetch regulator pages (UETA / ESIGN / eIDAS / state RON) that change
  - gemini-ocr-mcp                                  # AI OCR for scanned paper contracts
  - mistral-ocr-mcp                                 # alt OCR
  - openai-ocr-mcp                                  # alt OCR
  - easyocr-mcp                                     # open-source OCR for non-Latin scripts
  - deepl-mcp                                       # multilingual template translation (tag_handling=html)
  - playwright-mcp                                  # end-to-end test form-to-doc-to-sign flows; browser automation for portal-only platforms
  - github                                          # version control on template + clause library
  - stripe-mcp                                      # read deal / quote info for dynamic pricing
  - linear-mcp                                      # task creation for review / approval workflow
  - jira-mcp                                        # Jira alternative
  - posthog-mcp                                     # document analytics (time-to-sign, drop-off)
  - mixpanel-mcp                                    # alt document analytics
  - amplitude-mcp                                   # alt document analytics

