# Business Development / Partnerships — CraftBot agent definition
#
# GENERAL TIER. Senior BD/partnerships operator: partner sourcing,
# agreement structuring (referral / affiliate / channel / integration /
# OEM), marketplace listings (AWS / Azure / GCP / AppExchange / HubSpot /
# Shopify / Slack / OpenAI / Stripe / Atlassian / AppSource), partner
# enablement + certification, co-marketing, MDF allocation + tracking,
# channel pricing + deal registration, integration roadmap planning,
# Partnerstack / Tackle / Crossbeam / Reveal channel + account mapping,
# partner scorecards, ecosystem mapping, partner-led events, partner-
# sourced pipeline tracking, channel-conflict resolution, partner
# advisory board, Partner NPS, 90-day onboarding, tech-partner integration
# health, joint customer stories, QBRs, off-boarding.
#
# Three load-bearing convictions: (1) Partnerships have to be valuable to
# BOTH sides — extractive deals collapse. (2) Channel is not direct sales —
# different metrics, different motions, different incentives. (3)
# Integration partnerships need a roadmap, not a press release.
#
# Every field traces back to reference/. See reference/INVENTORY.md for
# sources and SOURCES.md for the section→source map.

name: Business Development / Partnerships
slug: bd-partnerships
category: business-dev
tier: general
description: >
  Senior end-to-end BD / partnerships operator for solo founders and small
  revenue teams. Sources partners (PICP definition + Crunchbase / Pitchbook
  / LinkedIn / Apollo waterfall), structures referral / affiliate /
  channel-reseller / integration / OEM agreements, builds marketplace
  listings (AWS / Azure / GCP / Salesforce AppExchange / HubSpot / Shopify
  / Slack / OpenAI / Stripe / Atlassian / Microsoft AppSource), runs
  partner enablement + certification, designs co-marketing campaigns,
  allocates and tracks MDF, sets channel pricing + deal-registration
  rules, plans integration roadmaps with product, manages Partnerstack /
  Tackle / Allbound / Impartner channel programs, runs Crossbeam / Reveal
  account mapping, authors quarterly scorecards, maps ecosystems, runs
  partner-led webinars + events, tracks partner-sourced pipeline, resolves
  channel conflict, runs Partner Advisory Boards + Partner NPS, executes
  90-day onboarding plans, monitors integration health, produces joint
  customer stories, runs QBRs, off-boards under-performing partners.
  Defers to sales-agent for direct sales, marketing-agent for top-of-
  funnel creative, product-manager for integration scoping, legal-counsel
  for binding contract redlines, finance-controller for MDF accounting and
  commission accounting.
tags:
  - business-development
  - partnerships
  - channel
  - referral
  - affiliate
  - reseller
  - oem
  - integration-partnerships
  - marketplaces
  - aws-marketplace
  - azure-marketplace
  - gcp-marketplace
  - appexchange
  - hubspot-app-marketplace
  - shopify-app-store
  - co-marketing
  - mdf
  - deal-registration
  - partner-enablement
  - partner-scorecard
  - account-mapping
  - crossbeam
  - reveal
  - partnerstack
  - tackle
  - partner-nps
  - ecosystem-mapping

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills are resolved at build time:
#   1. agents/bd-partnerships/skills/<name>/  (bundled — ships INSIDE the .craftbot)
#   2. <repo>/skills/<name>/                  (CraftBot default)
enabled_skills:
  # ── Bundled (20) — 2026 SOTA partnerships skill packs ─────────────────
  - partner-sourcing-icp-definition                        # PICP scoring + Crunchbase/Apollo/LinkedIn waterfall
  - referral-affiliate-channel-oem-agreement-structuring   # 5 archetype contract shells via PandaDoc/DocuSign
  - aws-azure-gcp-marketplace-listings                     # Tackle + AWS/Azure/GCP CLI Catalog APIs
  - salesforce-appexchange-listing                         # Code Analyzer + Partner Console + ISVForce
  - hubspot-shopify-slack-marketplace-listings             # HubSpot/Shopify/Slack/OpenAI/Stripe/Atlassian/AppSource
  - partner-enablement-certification-programs              # tiered cert + LMS + sandbox
  - co-marketing-campaign-design                           # joint plan + co-branded assets + JMA
  - mdf-allocation-tracking                                # MDF request → approval → POP → payout
  - channel-pricing-discount-tiers                         # margin tier matrix + deal-reg uplift
  - integration-roadmap-planning                           # joint roadmap + product-manager hand-off
  - partnerstack-tackle-channel-management                 # Partnerstack/Tackle/Allbound/Impartner ops
  - crossbeam-reveal-account-mapping                       # Crossbeam/Reveal/Snowflake co-sell overlap
  - partner-scorecard-authoring                            # quarterly scorecard with 4-6 KPIs per partner type
  - ecosystem-mapping-tech-stack-discovery                 # BuiltWith/Clay + DrawIO/Figma viz
  - partner-led-webinars-events                            # Zoom Webinars + Goldcast joint event flow
  - partner-sourced-pipeline-tracking                      # CRM attribution + weekly rollup
  - deal-registration-channel-conflict-resolution          # registration workflow + 48h SLA + conflict log
  - partner-advisory-board-pab                             # PAB summit + roadmap synthesis
  - partner-nps-satisfaction-survey                        # Partner NPS quarterly + detractor recovery
  - partner-onboarding-90-day-plan                         # 90-day standardized playbook

  # ── CraftBot defaults (26) — already on recipient's install ──────────
  # Universal verbs.
  - cli-anything                            # universal verb (aws/az/gcloud/sfdx/curl/jq/python/pandas)
  - file-format                             # cross-format conversion
  - file-organizer                          # partner-file organization

  # CRM + sales tech (managed OAuth via api-gateway covers HubSpot,
  # Salesforce, Apollo, Partnerstack, Tackle, Crossbeam, Reveal, PandaDoc,
  # DocuSign, Calendly, Crunchbase, Allbound, Impartner, and 100+ more).
  - api-gateway                             # the universal sales/SaaS API proxy
  - attio-api                               # modern CRM
  - pipedrive-api                           # CRM
  - salesforce-api                          # CRM
  - zoho-crm                                # CRM
  - calendly-api                            # scheduling
  - linkedin                                # LinkedIn social-selling + partner sourcing

  # Documents + collateral.
  - docx                                    # 1-pagers, briefs, contracts
  - pdf                                     # listing assets, scorecards, QBR books
  - pptx                                    # joint pitch decks, QBR decks, PAB pre-reads
  - xlsx                                    # pricing matrices, scorecards, MDF tracking
  - microsoft-excel                         # Excel for finance handoff
  - google-sheets                           # joint dashboards, account mapping CSVs

  # Knowledge + comms.
  - notion                                  # partner DB, playbooks, QBR records, MDF tracking
  - slack                                   # partner channels, deal-reg alerts
  - microsoft-teams                         # Microsoft-shop comms
  - gmail                                   # partner outreach + onboarding
  - outlook                                 # alt mailbox

  # Research + ideation.
  - playwright-mcp                          # marketplace portal automation
  - brave-search                            # ecosystem research
  - brainstorming                           # joint-GTM brainstorm
  - concise-planning                        # 90-day plans + QBR agendas
  - ask-questions-if-underspecified         # clarify before drafting
  - typeform                                # Partner NPS surveys

# MCP servers — every name MUST exist in app/config/mcp_config.json
# (verify.py checks this). Recipient enables each in CraftBot MCP
# settings and adds OAuth/API credentials per platform.
mcp_servers:
  - filesystem                              # read/edit partner collateral

  # ── Email + comms ────────────────────────────────────────────────────
  - gmail-mcp                               # partner outreach + onboarding comms
  - outlook-mcp                             # Microsoft-shop email
  - slack-mcp                               # partner channels, deal-reg alerts, MDF approvals
  - ms-teams-mcp                            # Microsoft-shop notifications
  - zoom-mcp                                # partner webinars + QBR + PAB summits
  - google-calendar-mcp                     # joint meetings + recurring QBRs

  # ── Knowledge + workflow ─────────────────────────────────────────────
  - notion-mcp                              # partner DB, playbooks, QBR records, scorecards, MDF tracking
  - linear-mcp                              # integration partnership tickets → product team
  - jira-mcp                                # alt issue tracker for integration partners

  # ── Data warehouse + analytics ───────────────────────────────────────
  - postgresql-mcp                          # warehouse queries: scorecards, pipeline rollups, hygiene cron
  - posthog-mcp                             # integration adoption analytics
  - mixpanel-mcp                            # alt product analytics
  - amplitude-mcp                           # alt product analytics + behavioral cohorts
  - sentry-mcp                              # integration error monitoring + health checks

  # ── Research + scraping ──────────────────────────────────────────────
  - playwright-mcp                          # marketplace portal automation (AppExchange, Shopify, Atlassian, AppSource)
  - firecrawl-mcp                           # ecosystem mapping + tech-stack scraping
  - brightdata-mcp                          # LinkedIn Sales Nav scraping for partner sourcing
  - brave-search                            # ecosystem + competitive research
  - google-scholar-mcp                      # research-heavy verticals (regulated industries)

  # ── Translation (multi-region partner programs) ──────────────────────
  - deepl-mcp                               # multi-language onboarding + agreements

  # ── Design + collateral ──────────────────────────────────────────────
  - imagegen-mcp                            # marketplace listing screenshots + asset gen
  - canva-mcp                               # co-branded one-pagers + QBR decks
  - figma-mcp                               # design fidelity + integration architecture diagrams
  - drawio-mcp                              # ecosystem maps + integration architecture

  # ── Video / social (joint stories + partner socials) ────────────────
  - youtube-mcp                             # joint customer-story video distribution
  - tiktok-mcp                              # partner social motions (rare but real)

  # ── Payments + commerce (marketplace listings) ──────────────────────
  - stripe-mcp                              # Stripe Marketplace + Stripe Connect payouts

  # ── Storage + sharing ───────────────────────────────────────────────
  - google-drive-mcp                        # joint asset sharing with partners

  # ── Learning management (partner certifications) ────────────────────
  - canvas-lms-mcp                          # partner certification programs

