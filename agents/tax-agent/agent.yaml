# Tax Agent — CraftBot agent definition
#
# Operational tax specialist sitting under `finance-controller` (parent — owns
# bookkeeping + monthly close + ASC 740 inputs). Owns the filing surface:
# federal + state corporate income tax (Forms 1120 / 1065 / 1120-S), payroll
# tax (Forms 941 / 940), 1099 family + W-2, sales/use tax (multi-state),
# international Forms 5471 / 5472 / 8865, R&D credit (Form 6765), QSBS
# Section 1202 (incl. Big Beautiful Bill 2025 expansion), beneficial
# ownership (FinCEN BOI), Pillar 2 / GloBE / CbCR, IRS + state DOR notice
# response, ASC 740 tax provision (computes — finance-controller owns the
# close inputs).
#
# Every field traces back to reference/SOTA_USE_CASES.md or to a default
# CraftBot capability already shipped on the recipient's install. See
# reference/INVENTORY.md for sources and SOURCES.md for the section→source map.

name: Tax Agent
slug: tax-agent
category: finance
tier: specialized
description: >
  Operational tax specialist — federal / state / multi-jurisdiction corp +
  payroll + sales/use tax filings, R&D credits, QSBS, transfer pricing,
  Pillar 2 / BEPS, IRS notice response, ASC 740 provision. Files Forms 1120
  / 1065 / 1120-S / 941 / 940 / 1099 family / 5471 / 5472 / 8865 / 6765 /
  8975 / 8997. Tracks 83(b) 30-day windows, Section 1202 QSBS 3/4/5-yr
  holding tiers (Big Beautiful Bill 2025), NOL waterfalls + Section 382
  ownership-change limits, Section 174 R&D capitalization (TCJA 2017 +
  OBBB 2025 domestic-R&D reversal), Section 280E cannabis disallowance,
  Section 199A QBI, Section 1031 like-kind 45/180-day windows, Section
  1400Z Opportunity Zones, IRC 280E. Sits under `finance-controller`
  (operational tax) and adjacent to `finance-agent` (strategic finance),
  `legal-counsel` (entity formation legal mechanics), `compliance-agent`
  (regulatory reporting). Three convictions: (1) documentation BEFORE
  filing — auditors love trails; (2) tax planning is multi-year — single-
  year optimization can wreck future returns; (3) most "tax loopholes"
  online are 5+ years out of date. **MANDATORY disclaimer:** every binding
  tax output includes "consult a licensed CPA / tax attorney."
tags:
  - finance
  - tax
  - corporate-tax
  - sales-tax
  - payroll-tax
  - rd-credit
  - qsbs
  - section-1202
  - asc-740
  - international-tax
  - transfer-pricing
  - pillar-2
  - globe
  - fincen-boi
  - cta
  - irs-notice
  - state-dor
  - section-174
  - section-280e
  - section-1031
  - opportunity-zones
  - apportionment
  - nexus

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills resolved at build time. Build script looks up names in
# agents/tax-agent/skills/ (bundled — Round 2 creates the contents)
# first, then top-level skills/ (CraftBot defaults — already on recipient).
enabled_skills:
  # ── Bundled (21) — SOTA tax skill packs we ship with this agent ──────
  # Round 2 creates each skills/<name>/SKILL.md.
  - form-1120-corp-income-tax-filing        # Drake / ProConnect / UltraTax / CCH; book-to-tax M-1/M-3; e-file MeF
  - form-1065-1120s-passthrough-filing      # Partnership + S-corp; K-1 generation; AAA + 704(b) basis tracking
  - multistate-sales-tax-anrok-stripe-avalara  # Anrok + Stripe Tax + Avalara + Numeral + Sphere; SaaS taxability per state
  - payroll-tax-940-941-quarterly-annual    # Gusto / Rippling / ADP / Paychex; safe-harbor estimated tax
  - 1099-k-misc-nec-w2-filing               # Track1099 / Tax1099 / Stripe 1099-K; threshold matrix + 1042-S
  - transfer-pricing-form-5471-8865-5472    # CFC (5471) + foreign partnership (8865) + reportable txns (5472) + TP studies
  - rd-tax-credit-form-6765-mainstreet-neo  # MainStreet / Neo Tax / Strike Tax; payroll allocation; ASC method
  - qsbs-section-1202-bbb-2025-expansion    # Carta QSBS + Pulley; tiered exclusion 50/75/100% (OBBB 2025)
  - nol-amt-multi-year-tax-planning         # NOL waterfall + Section 382 + CAMT + multi-year planning
  - pillar-2-globe-cbcr-international       # OECD Pillar 2 + GloBE IIR/UTPR/QDMTT + CbCR Form 8975
  - beneficial-ownership-fincen-boi-cta     # CTA / BOI rule + FinCEN BOSS portal + March 2025 interim final rule
  - sales-tax-nexus-study-economic-physical # Wayfair thresholds per state + physical presence map
  - irs-state-dor-notice-response           # CP2000 / CP501 / CP504 / state DOR templates + 30/60/90-day deadlines
  - asc-740-tax-provision-deferred          # M-1/M-3 + deferred tax + valuation allowance + UTP FIN 48
  - sec-174-rd-capitalization               # TCJA 2017 capitalization + OBBB 2025 reversal for domestic R&D
  - entity-structure-c-vs-s-vs-llc          # C-corp / S-corp / LLC / partnership decision matrix + Section 280E
  - iso-nso-rsu-employee-tax-treatment      # Equity comp tax mechanics + 83(b) 30-day + AMT Form 6251
  - fringe-benefit-tax-sec-132-274          # Section 132 exclusions + Section 274 meal/entertainment 50% limit
  - opportunity-zones-1031-like-kind        # Sec 1400Z QOF + Sec 1031 real-property 45/180-day windows
  - state-apportionment-nexus-analysis      # Single-sales factor + market-based sourcing + state thresholds
  - tax-audit-prep-response-federal-state   # Substantiation library + IDR response + 30/90-day letter

  # ── CraftBot defaults (22) — already on recipient's install ──────────
  # Always evaluate (per METHODOLOGY.md default skills audit checklist):
  - cli-anything                            # universal verb for Drake/ProConnect/CCH/MainStreet/Anrok/Track1099 REST
  - file-format                             # convert receipts / 1099s / W-2s between formats
  - file-organizer                          # organize tax binder, substantiation library, audit packet
  - using-git-worktrees                     # isolated worktree per tax year (e.g., TY2025, TY2026)

  # Content / comms (tax delivers a lot of memos + emails + filings):
  - docx                                    # Tax position memo, M-1/M-3 reconciliation memo, notice response letter
  - pdf                                     # Form output, K-1 distribution PDFs, substantiation export
  - pptx                                    # Board / audit committee tax-provision update slides
  - xlsx                                    # M-1/M-3 reconciliation, deferred tax waterfall, NOL waterfall, R&D allocation, apportionment, QSBS tiered exclusion model
  - google-sheet                            # Live shared tax models for team collaboration
  - microsoft-excel                         # Local Excel for sensitive equity / QSBS / Section 1202 work
  - gmail                                   # Notice response acknowledgments, K-1 distribution, vendor 1099 outreach
  - notion                                  # Tax workpaper library / SOPs / filing calendar / substantiation index
  - obsidian                                # Alt local-first notes for sensitive equity-tax drafts

  # Existing finance / accounting defaults that ship:
  - xero                                    # Xero via Maton-managed OAuth — pull GL for M-1/M-3 + sales by state
  - stripe-api                              # Stripe via Maton gateway — pull Stripe Tax + Sigma sales-by-state

  # Research + planning (tax spends substantial time researching statute + case law):
  - brainstorming                           # Position hypothesis generation; structural restructure scenarios
  - concise-planning                        # Filing-calendar planning per tax year
  - ask-questions-if-underspecified         # Clarify entity / state / tax year / instrument before computing
  - audit-context-building                  # Gather context rigorously before stating tax positions
  - verification-before-completion          # Tie out M-1/M-3 / NOL waterfall / deferred tax before delivering

  # Versioning / collaboration:
  - git-commit                              # Version-control tax workpapers + close packages by tax year
  - markdown-converter                      # Convert tax docs across formats

  # Scheduling (CRITICAL — tax has hard statutory deadlines):
  - remindme                                # 83(b) 30-day window, 1031 45/180-day window, BOI 30-day window, IRS notice 30/60/90-day, quarterly estimated tax dates

# MCP servers — every name must exist in app/config/mcp_config.json
# (verify.py checks this). The recipient enables each in their MCP settings
# after importing the .craftbot bundle and fills in any required API keys.
mcp_servers:
  - filesystem                              # always

  # ── Bookkeeping + billing core (for book-to-tax M-1/M-3) ─────────────
  - xero-mcp                                # GL for book income → tax income reconciliation
  - stripe-mcp                              # Stripe Tax + Sigma queries for sales by state + apportionment

  # ── SEC / public-market reference (for R&D + TP benchmarks) ──────────
  - sec-edgar-mcp                           # peer benchmarks for TP comparable data + R&D allocation
  - octagon-sec-mcp                         # alt SEC research for TP benchmarks
  - yahoo-finance-mcp                       # public-comp data for comparable companies
  - alpha-vantage-mcp                       # alt market data
  - mcp-finance                             # multi-source finance data aggregator

  # ── Database / GL access ─────────────────────────────────────────────
  - postgresql-mcp                          # raw GL queries when accounting DB exposed; M-1/M-3 / deferred tax temp diffs

  # ── Comms (notice response, K-1 distribution, IRS / state DOR letters) ──
  - gmail-mcp                               # send notice acknowledgments + K-1 distribution + 1099 vendor outreach
  - outlook-mcp                             # alt for recipients on Outlook
  - notion-mcp                              # tax workpaper library + SOPs + filing calendar
  - slack-mcp                               # team finance comms (filing deadlines, notice triage)

  # ── Research / scrape / OCR (statutory research + paper notices) ─────
  - firecrawl-mcp                           # IRS.gov + state DOR site scraping for current statute + form instructions
  - brightdata-mcp                          # paid scrape for TP comparable databases (RoyaltyStat / RoyaltyRange paywalls)
  - huggingface-mcp                         # industry benchmark dataset discovery (R&D / TP / payroll)
  - gemini-ocr-mcp                          # OCR for paper IRS notices + 1099s + W-2s + invoices for substantiation
  - mistral-ocr-mcp                         # alt OCR engine for paper notices

  # ── Reliability + audit trail ────────────────────────────────────────
  - sentry-mcp                              # incident financial impact when computing tax provision adjustment for unusual losses

