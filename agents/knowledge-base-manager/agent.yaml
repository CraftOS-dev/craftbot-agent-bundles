# Knowledge Base Manager — CraftBot agent definition
#
# Every field traces back to research in reference/SOTA_USE_CASES.md or to
# a default CraftBot capability already shipped on the recipient's install.
# See reference/INVENTORY.md for sources and SOURCES.md for the section→source
# map.

name: Knowledge Base Manager
slug: knowledge-base-manager
category: content
tier: specialized
description: >
  Knowledge base operator — designs taxonomy, optimizes search, manages
  content lifecycle (draft → review → publish → archive), tracks doc
  analytics (deflection rate, exit rate, no-result-found, time-on-page),
  enforces KB governance, integrates AI assistants (Kapa.ai / Inkeep /
  Mendable / Markprompt) on top of docs, ships localized + versioned KBs
  with SSO gating, and runs content audits + review cadences. Sits one
  tier under `technical-writer` (which owns developer docs / API refs /
  ADRs). Defers deep public-KB SEO to `seo-specialist`, internal-process
  SOPs to `operations-agent`, support-workflow design to
  `customer-support-agent`, and community-driven KB contribution to
  `community-manager`.
tags:
  - knowledge-base
  - kb-taxonomy
  - kb-governance
  - kb-search-optimization
  - kb-analytics
  - deflection-rate
  - content-lifecycle
  - ai-doc-assistant
  - notion-kb
  - confluence-kb
  - intercom-articles
  - zendesk-guide
  - documentation-ops

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills are resolved at build time. The build script looks up each name in
# agents/knowledge-base-manager/skills/ (bundled — ships INSIDE the .craftbot)
# first, then in the repo's top-level skills/ (default — already on the
# recipient's CraftBot install).
enabled_skills:
  # ── Bundled (24) — SOTA KB-operator skill packs we ship with this agent ───
  # Round 2 creates the SKILL.md contents. See reference/SOTA_USE_CASES.md
  # for the SOTA mechanism each pack covers.
  - kb-taxonomy-design-categories-tags-hierarchy           # 5-tier IA + card-sort + Diátaxis overlay
  - algolia-typesense-search-optimization                  # synonyms, ranking, autocomplete; Algolia / Typesense / MeiliSearch / Pagefind / Orama
  - content-lifecycle-draft-review-publish-archive         # 5-state workflow + Notion/Confluence/git automation
  - doc-analytics-clarity-ga4-algolia-insights             # top-searched / no-result / high-exit / time-on-page
  - knowledge-ops-owner-contributor-flow                   # RACI matrix, owner pings, contributor leaderboard
  - kb-governance-style-vale-rules                         # Vale + markdownlint + alex + last-verified stamp
  - kb-roi-deflection-rate                                 # deflection formula + per-article ROI
  - kb-authoring-training-non-doc-team                     # checklist + templates + Vale-as-tutor
  - content-audit-stale-inaccurate-redundant               # Lychee + pytest-markdown-docs + simhash dedup
  - content-migration-between-platforms                    # Notion-to-md, Confluence-to-md, Zendesk → md
  - kb-seo-aeo-geo-public-ranking                          # Schema.org + llms.txt + Ahrefs/AthenaHQ tracking
  - customer-facing-kb-support-deflection                  # Intercom / Pylon / Helpdesk articles + in-product widgets
  - employee-facing-internal-wiki-notion-slab              # Notion teamspaces + Tettra/Slab/Guru + Slack surfacing
  - ai-doc-assistant-kapa-inkeep-mendable                  # Kapa.ai / Inkeep / Mendable / Markprompt FOSS
  - multi-language-localized-kb-deepl-crowdin              # DeepL + Crowdin / Lokalise + locale routing
  - sso-gated-kb-okta-auth0                                # SAML/OIDC + SCIM provisioning
  - kb-versioning-per-product-docusaurus-mike              # versions config + mike + Mintlify versions.json
  - content-reuse-single-source-asciidoc-antora            # AsciiDoc + Antora + Docusaurus/Mintlify partials
  - kb-feedback-collection-helpful-open                    # native KB feedback + Cloudflare Workers fallback
  - content-review-cadence-monthly-quarterly               # GitHub Actions stale-bot + quarterly audit aggregator
  - interactive-guide-stonly-whatfix                       # Stonly / Whatfix / Pendo / Shepherd.js FOSS
  - video-kb-loom-tango-scribe                             # Loom + Tango / Scribe + Guidde embeds
  - changelog-beamer-headway-inproduct                     # Beamer / Headway / LaunchNotes + RSS feed fallback
  - expert-finder-who-knows-x                              # Notion db + Slack history + git author analysis

  # ── CraftBot defaults (13) — already on the recipient's install ───────────
  # Content I/O, version control, doc tooling, review, web/search.
  - docx                            # produce Word output for KB exports
  - pdf                             # produce PDF for archived / legal-bound KB articles
  - pptx                            # KB walkthrough decks for trainers and onboarding
  - file-format                     # convert between KB-export formats
  - cli-anything                    # universal verb — Vale / Lychee / markdownlint / mike / Algolia CLI / DeepL / OptimalSort / Antora / wrangler etc.
  - file-organizer                  # organize source-of-truth KB tree (`docs/get-started/`, `how-to/`, `concept/`, `reference/`)
  - git-commit                      # Conventional Commits for KB changes
  - github                          # gh CLI — open PRs for KB changes, comment on issues
  - github-api                      # raw GitHub API — CODEOWNERS, stale-bot, content scans
  - using-git-worktrees             # isolate KB branches from product code work
  - playwright-mcp                  # capture screenshots for in-app help / KB articles
  - firecrawl                       # crawl competitor / legacy KBs for benchmark or migration
  - markdown-converter              # convert legacy HTML / docx / Confluence storage format → markdown

# MCP servers — every name must exist in app/config/mcp_config.json. The
# recipient enables each in their MCP settings after importing the .craftbot
# bundle and fills in API keys. Selection driven by SOTA_USE_CASES.md.
mcp_servers:
  - filesystem                      # read/edit KB markdown / config / redirect files
  - github                          # PRs, issues, CI workflows for git-backed KBs

  # ── KB platforms (Notion is MCP-native; others via cli-anything) ─────────
  - notion-mcp                      # Notion-based KBs (content + RACI db + expert finder)

  # ── Surfacing + owner pings ─────────────────────────────────────────────
  - slack-mcp                       # Slack-first KB surfacing, owner notifications, expert finder
  - gmail-mcp                       # owner stale-content alerts; transactional KB-link emails

  # ── Ticketing → KB feedback loops ──────────────────────────────────────
  - linear-mcp                      # ticket clusters → "missing-KB-article" Linear tickets
  - jira-mcp                        # same for Jira-shop orgs

  # ── KB analytics ──────────────────────────────────────────────────────
  - posthog-mcp                     # KB product-analytics overlay (events, funnels)
  - mixpanel-mcp                    # alt analytics if recipient uses Mixpanel
  - amplitude-mcp                   # alt analytics if recipient uses Amplitude

  # ── Translation + multi-language ─────────────────────────────────────
  - deepl-mcp                       # SOTA translation for i18n KB workflows

  # ── Crawl + SEO benchmarking ─────────────────────────────────────────
  - firecrawl-mcp                   # crawl competitor / legacy KB for migration + benchmark
  - brightdata-mcp                  # public-KB SERP rank tracking + SEO data

  # ── OCR for legacy KB capture ────────────────────────────────────────
  - gemini-ocr-mcp                  # extract text from screenshot-only legacy KB
  - mistral-ocr-mcp                 # alt OCR provider

  # ── Visual + design ──────────────────────────────────────────────────
  - figma-mcp                       # screenshots for in-app help, design-system KB
  - drawio-mcp                      # IA / taxonomy diagrams + content-flow visualization

