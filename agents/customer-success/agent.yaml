# Customer Success — CraftBot agent definition
#
# GENERAL TIER. Senior end-to-end customer success operator: customer
# onboarding (Day 0/7/30/60/90), success plan creation, QBR scheduling +
# facilitation, customer health scoring, NRR/GRR ownership, expansion
# opportunity identification, renewal management (90-day prep), churn
# save motion, customer advocacy programs (case studies, references, G2
# reviews), executive sponsor relationships, customer interview programs,
# customer advisory board (CAB) management, voice-of-customer reporting
# to product, in-app onboarding flows, in-product surveys, NPS/CSAT/CES
# tracking, adoption metric tracking, playbook automation, ramp-to-value
# tracking, at-risk identification + escalation, customer touchpoint
# cadence, success enablement (academies / certification), referral
# programs, customer milestone tracking, feature adoption interventions,
# expansion email sequences, multi-product cross-sell, contract uplift
# management.
#
# DISTINCT from customer-support-agent (reactive ticket-driven support).
# This agent owns the proactive relationship surface: onboarding ->
# adoption -> renewal -> expansion -> advocacy. Customer-support-agent
# owns the queue.
#
# Three load-bearing convictions: (1) NRR > GRR > new logo - keep what
# you have. (2) Success plans need outcomes, not features. (3) Renewal
# starts on day 1 - onboarding is the first save.
#
# Every field traces back to reference/SOTA_USE_CASES.md and SOURCES.md.

name: Customer Success
slug: customer-success
category: customer-success
tier: general
description: >
  Senior end-to-end customer success operator for teams who own NRR / GRR
  and the renewal-to-expansion arc. Runs onboarding (Day 0/7/30/60/90
  milestones), builds success plans, schedules and facilitates QBRs,
  computes and acts on customer health scores (Vitally / Catalyst /
  ChurnZero / Gainsight), identifies expansion opportunities (Pocus /
  Common Room / PostHog signals), prepares 90-day renewal cadence, fires
  churn save motions on early-warning signal, runs voice-of-customer
  programs (interviews, NPS/CSAT/CES, CAB), drives in-app onboarding
  (Pendo / Userpilot / Appcues), and feeds product the voice-of-customer
  insights via Linear/Jira. Three convictions: NRR beats GRR beats new
  logo; success plans need outcomes not features; renewal starts on day
  1 - onboarding is the first save. DISTINCT from customer-support-agent
  (reactive support tickets - different motion); defers to sales-agent
  (new logo + expansion close), product-manager (voice of customer ->
  roadmap), marketing-agent (customer marketing + case study writing),
  finance-controller (revenue recognition).
tags:
  - customer-success
  - csm
  - onboarding
  - qbr
  - health-score
  - nrr
  - grr
  - renewal
  - expansion
  - churn
  - advocacy
  - voice-of-customer
  - cab
  - csp
  - vitally
  - gainsight
  - churnzero
  - catalyst
  - pendo
  - userpilot
  - adoption

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills are resolved at build time:
#   1. agents/customer-success/skills/<name>/  (bundled - ships INSIDE the .craftbot)
#   2. <repo>/skills/<name>/                   (CraftBot default - already on recipient's install)
enabled_skills:
  # -- Bundled (22) -- 2026 SOTA customer-success skill packs ----------
  - customer-onboarding-day-0-90                            # Day 0/7/30/60/90 milestones + Vitally Projects / Notion fallback
  - success-plan-goals-milestones                           # success plan structure (goal / milestone / criteria / owner)
  - qbr-scheduling-facilitation                             # Calendly + Zoom + Fathom + PPTX QBR end-to-end
  - customer-health-scoring-vitally-catalyst-churnzero      # composite health score + read/write to CSP + Slack alert
  - nrr-grr-ownership-metrics                               # Stripe + CRM + Postgres NRR/GRR math + reporting
  - expansion-opportunity-identification                    # Pocus / Common Room / PostHog signals -> ranked list
  - renewal-management-90-day-prep                          # T-90/60/30/7 cadence + PandaDoc + DocuSign
  - churn-save-motion-intervention                          # composite early-warning + save play execution
  - customer-advocacy-case-study-reference                  # Influitive / Slapfive + Delighted-fed promoter list
  - customer-advisory-board-cab                             # Bevy / Slack Connect / Discord CAB community
  - voice-of-customer-reporting                             # interview + NPS + ticket synthesis -> Linear
  - in-app-onboarding-userpilot-appcues-pendo               # in-product onboarding flow design + API CRUD
  - nps-csat-ces-tracking                                   # Delighted / Survicate / Sprig survey ops
  - adoption-metric-feature-usage                           # DAU/MAU/WAU per customer + feature adoption tracking
  - playbook-automation-churnzero-plays                     # if-this-then-that playbook orchestration
  - ramp-to-value-tracking                                  # TTFV / TTRV funnel via PostHog/Pendo
  - at-risk-identification-escalation                       # composite risk score + auto-escalate
  - success-enablement-academy-certification                # Skilljar / Notion academy + cert tracking
  - referral-programs                                       # Friendbuy / Tremendous / Stripe credit reward
  - customer-milestone-anniversary                          # anniversary / milestone celebration triggers
  - feature-adoption-interventions                          # PostHog cohort -> Pendo nudge -> email follow-up
  - multi-product-cross-sell-uplift                         # expansion email sequences via Klaviyo / Customer.io / Outreach

  # -- CraftBot defaults (24) -- already on recipient's install -------
  # Universal verbs.
  - cli-anything                            # universal verb (curl, jq, python for Vitally/Catalyst/Pendo/etc.)
  - file-format                             # cross-format conversion
  - file-organizer                          # success-plan + QBR + renewal-doc organization

  # CRM defaults - managed OAuth via api-gateway covers HubSpot, Salesforce,
  # Vitally, Catalyst, Pendo, Userpilot, Skilljar, Friendbuy, etc.
  - api-gateway                             # universal SaaS API proxy (HubSpot, Vitally, Pendo, etc.)
  - attio-api                               # modern CRM (default skill)
  - pipedrive-api                           # SMB CRM (default skill)
  - salesforce-api                          # enterprise CRM (default skill)
  - zoho-crm                                # CRM (default skill)
  - calendly-api                            # QBR + interview + reference-call scheduling
  - fathom-api                              # QBR + interview transcript + action-item extraction

  # Documents + collateral.
  - docx                                    # success plans, VOC reports, case study drafts
  - pdf                                     # executive briefs, post-mortem write-ups
  - pptx                                    # QBR decks, exec business reviews, board summaries
  - xlsx                                    # NRR/GRR models, health-score dashboards, renewal forecasts

  # Knowledge + comms.
  - notion                                  # success plans, CAB roster, VOC insights DB, renewal board
  - better-notion                           # advanced Notion patterns
  - slack                                   # CSM alerts, exec channels, Connect for B2B
  - microsoft-teams                         # Microsoft-shop pings
  - gmail                                   # outreach + renewal emails + advocacy invites
  - outlook                                 # alt mailbox

  # Research + ideation + cross-check.
  - playwright-mcp                          # browse customer marketing sites
  - brave-search                            # research for QBR + customer context
  - brainstorming                           # success-plan goal ideation + outreach phrasing
  - concise-planning                        # success-plan authoring + QBR-deck structure
  - ask-questions-if-underspecified         # clarify before drafting
  - audit-context-building                  # gather customer history rigorously before action
  - gemini                                  # second-opinion model for delicate outreach / renewal copy

# MCP servers - every name MUST exist in app/config/mcp_config.json
# (verify.py checks this). Recipient enables each in CraftBot MCP
# settings and adds OAuth/API credentials per platform.
mcp_servers:
  - filesystem                              # always - read/edit playbooks + success-plan templates + renewal board

  # -- Email + comms --------------------------------------------------
  - gmail-mcp                               # outreach + renewal emails + advocacy invites + onboarding milestones
  - outlook-mcp                             # Microsoft-shop email alt
  - slack-mcp                               # CSM alerts + exec channels + Slack Connect for B2B accounts
  - ms-teams-mcp                            # enterprise customers on Teams
  - zoom-mcp                                # QBRs + customer interviews + CAB meetings + reference calls
  - twilio-mcp                              # SMS escalation for at-risk + VIP touchpoints

  # -- Knowledge + workflow ------------------------------------------
  - notion-mcp                              # success plans + CAB roster + VOC insights DB + renewal board
  - linear-mcp                              # VOC -> roadmap issues + churn save plans + product handoff
  - jira-mcp                                # Atlassian-shop product handoff alt
  - discord-mcp-full                        # CAB Discord communities
  - discord-mcp                             # CAB Discord basic

  # -- Data warehouse + product analytics ----------------------------
  - postgresql-mcp                          # warehouse for NRR/GRR/health-score cohorts + adoption metrics + risk model
  - posthog-mcp                             # product analytics (adoption, expansion signals, churn signals, TTFV funnels)
  - mixpanel-mcp                            # alt product analytics
  - amplitude-mcp                           # alt product analytics + behavioral cohorts

  # -- Payments + commerce -------------------------------------------
  - stripe-mcp                              # subscription state for renewal cadence + referral rewards + credit issuance

  # -- Research + scraping -------------------------------------------
  - playwright-mcp                          # browse customer marketing sites + competitive context
  - firecrawl-mcp                           # structured scraping of customer websites for QBR context
  - brightdata-mcp                          # LinkedIn scraping fallback for exec-sponsor tracking
  - brave-search                            # web research for customer context

  # -- Multilingual --------------------------------------------------
  - deepl-mcp                               # multilingual customer comms (renewal + onboarding emails)

  # -- Design + collateral -------------------------------------------
  - canva-mcp                               # branded QBR deck templates
  - figma-mcp                               # shared-design QBR materials + design-system fidelity
  - imagegen-mcp                            # anniversary card + milestone celebration imagery

