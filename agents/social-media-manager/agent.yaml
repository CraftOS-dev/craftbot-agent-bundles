  - influencer-fraud-detection-hypeauditor           # HypeAuditor AQS 70+ gate
  - reddit-strategy-ama-subreddit                    # Reddit MCP + AMA playbook + subreddit health scoring
  - discord-slack-community-moderation               # Carl-bot / MEE6 / Dyno + native MCPs
