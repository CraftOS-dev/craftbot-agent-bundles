  - community-engagement-comments-dms-at-scale       # Buffer MCP + Sprout/Agorapulse routing
  - social-listening-brandwatch-mention-talkwalker   # Brand24 MCP / Talkwalker / Meltwater
  - influencer-outreach-modash-aspire-grin           # Modash Discovery API + Aspire/GRIN CRM
