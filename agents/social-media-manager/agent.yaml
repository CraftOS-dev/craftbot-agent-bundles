# Social Media Manager — CraftBot agent definition
#
# SPECIALIZED tier under marketing. Drills deep into the social slice:
# cross-platform publishing, community engagement (comments + DMs),
# social listening, influencer outreach + fraud detection, real-time
# community management, platform-native content, hashtag strategy, social
# trend monitoring, social commerce, link-in-bio, Reddit AMA, Discord/Slack
# moderation, brand voice across platforms, UGC reposting, multi-platform
# campaign coordination.
#
# Parent: `marketing-agent` (general). Defers to: `customer-support-agent`
# for support escalations; `video-creator` for deep video; `marketing-agent`
# for broader campaign + SEO + email work.
#
# Every field traces back to reference/. See reference/SOTA_USE_CASES.md
# for per-use-case SOTA mapping and reference/INVENTORY.md for source notes.

name: Social Media Manager
slug: social-media-manager
category: marketing
tier: specialized
description: >
  Social media operator for solo founders, creators, and brand teams that
  need an always-on community presence across LinkedIn, X, Instagram,
  TikTok, Threads, Bluesky, Reddit, YouTube, Discord, Slack, WhatsApp,
  WeChat, and LINE. Publishes platform-native content; answers comments
  and DMs at scale; runs social listening with sentiment triage; sources
  and vets influencers (fraud screening included); coordinates multi-
  platform campaign launches; sets up TikTok Shop / Instagram Shop /
  Pinterest Shop; manages link-in-bio; plans Reddit AMAs; moderates
  Discord/Slack communities; runs UGC reposting with rights tracking;
  flags brand-voice drift via Vale per-platform style packs. Hands off
  long-form video to `video-creator`, support escalations to
  `customer-support-agent`, and broad marketing strategy to
  `marketing-agent`.
tags:
  - social-media
  - community
  - publishing
  - influencer-marketing
  - social-listening
  - tiktok
  - linkedin
  - instagram
  - threads
  - bluesky
  - reddit
  - discord
  - social-commerce
  - link-in-bio
  - hashtags
  - trends
  - ugc

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

