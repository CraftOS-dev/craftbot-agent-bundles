model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# 22 bundled SOTA skill packs (Round 2 will populate SKILL.md content).
# Each closes a documented use case from reference/SOTA_USE_CASES.md.
enabled_skills:
  # ── Bundled (22) — 2026 SOTA performance-ads skill packs ──────────────
  - meta-ads-campaign-structure-cbo-abo               # Meta CBO vs ABO, audience pyramid, bid strategy
  - google-ads-performance-max                        # PMax + standard Search + tROAS + asset groups
  - tiktok-ads-spark-promote                          # Spark Ads + Promote + Smart Performance Campaign
  - linkedin-ads-abm-campaigns                        # Matched Audiences + Sponsored Content + Lead Gen Forms
  - reddit-ads-niche-targeting                        # Subreddit targeting + Reddit CAPI
  - audience-pyramid-cold-warm-hot                    # Cold/warm/hot/LAL pyramid spec per platform
  - creative-testing-matrix-design                    # Creative x audience x offer matrix + z-test significance
  - creative-brief-authoring-for-designers            # Structured brief for designers / video team
  - ad-fatigue-rotation-strategy                      # Frequency/CPM/CTR thresholds + Madgicx/Revealbot rules
  - roas-sku-level-modeling                           # Per-SKU ROAS via Triple Whale or PostgreSQL warehouse
  - attribution-debugging-utm-hygiene                 # UTM convention enforcement, VTC/CTC, Funnel.io / Improvado
  - server-side-tracking-gtm-s-stape                  # GTM Server-side on Stape + CAPI forwarding + dedup
  - meta-capi-tiktok-events-google-enhanced-conversions  # Server-side conversion APIs + AEM priority ranking
  - mmm-meridian-robyn-recast-pymc                    # Meridian + GeoX / Robyn / Recast / lightweight_mmm / PyMC-Marketing
  - mobile-attribution-skan-appsflyer-adjust-branch   # SKAN 4.0 conversion-value schema + MMP integration
  - dynamic-product-feeds-shopping-dpa                # Meta Catalog + Google Merchant Center + DPA + PMax retail
  - retargeting-customer-list-match                   # Customer Match / Custom Audiences / Matched Audiences
  - geo-targeting-dayparting                          # Native geo + Google ad_schedule + Revealbot dayparting
  - account-audit-meta-google                         # check_signal_health + get_recommendations + structured audit
  - competitor-ad-spying-meta-ad-library              # Meta Ad Library API + Google Ads Transparency scrape
  - ai-creative-generation-adcreative-smartly         # AdCreative.ai + Smartly + Bannerbear + Creatify
  - landing-page-cro-coordination                     # Message match + PageSpeed Insights + VWO/Hotjar/Maze handoff

  # ── CraftBot defaults (20) — already on recipient's install ───────────
  # Universal verb + plumbing.
  - cli-anything                                      # universal verb for OSS Python libs (Robyn, Meridian, PyMC-Marketing, lightweight_mmm) + REST APIs (LinkedIn Marketing, Reddit Ads, Stape, Funnel.io, Improvado, AppsFlyer, Adjust, Triple Whale)
  - file-format                                       # cross-format conversion (CSV/JSON/XLSX feeds)
  - file-organizer                                    # campaign asset / creative library organization

  # Document output (audit decks, creative briefs, weekly reports).
  - xlsx                                              # creative testing matrix, ROAS by SKU, audit findings, MMM input CSV
  - docx                                              # creative briefs, account audits, attribution debugging memos
  - pptx                                              # weekly performance review, MMM result deck, account audit deck
  - pdf                                               # client deliverables, audit findings, MMM report
  - google-sheets                                     # collaborative spreadsheet (creative testing matrix, weekly KPI tracker)

  # Web + competitive research, landing page UX scan.
  - playwright-mcp                                    # browse competitor LPs, ad-creative reverse-image, landing-page UX scan
  - firecrawl                                         # structured scrape of Google Ads Transparency Center + competitor LPs
  - brave-search                                      # SERP scan for branded competitor terms
  - tavily-search                                     # multi-engine research for SOTA tool updates
  - web-search-plus                                   # multi-engine research fallback

  # Ideation, planning, cross-check.
  - brainstorming                                     # creative hook ideation, audience hypothesis generation
  - concise-planning                                  # test plan + measurement plan + budget plan
  - ask-questions-if-underspecified                   # clarify spend / objective / target CPA / ROAS before building
  - audit-context-building                            # rigorous discovery (pixel/CAPI health, account history, prior tests)
  - gemini                                            # second-opinion model for creative-brief review

  # Version control for campaign config + tracking-plan history.
  - git-commit                                        # track campaign config + UTM convention + GTM-S container changes

# MCP servers — every name must exist in app/config/mcp_config.json
# (verify.py checks this). The recipient enables each in their MCP
# settings after importing the .craftbot bundle and fills in any
# required API keys / OAuth.
mcp_servers:
  - filesystem                                        # read/edit campaign config, audit reports, creative briefs

  # ── Paid ads (primary surface) ────────────────────────────────────────
  - facebook-ads-mcp                                  # PRIMARY: Meta Ads (campaigns/adsets/ads/catalog/Advantage+/signal health/AEM)
  - tiktok-ads-mcp                                    # TikTok Marketing API (campaigns/ad groups/Spark Ads/custom audiences)

  # ── Organic context for paid (Ad Library scrape, organic learnings) ──
  - facebook-mcp-server                               # Meta Ad Library access via Page context
  - twitter-mcp                                       # X Ads via X Ads API (cli-anything fallback) + organic context
  - reddit-mcp                                        # organic Reddit context for niche targeting; Reddit Ads via cli-anything
  - tiktok-mcp                                        # organic TikTok context for Spark Ads partner selection

  # ── Analytics (conversion, funnel, retention crossover) ───────────────
  - posthog-mcp                                       # conversion / funnel / cohort HogQL for landing page CRO + post-click analysis
  - mixpanel-mcp                                      # alt product analytics + retention
  - amplitude-mcp                                     # alt product analytics + behavioral cohorts (e-com / DTC default)

  # ── Knowledge base + comms ────────────────────────────────────────────
  - notion-mcp                                        # creative library + experiment results DB + tracking-plan storage
  - gmail-mcp                                         # design-team brief send + budget approval + audit report delivery
  - slack-mcp                                         # ad-fatigue alerts + auto-stop notifications + spend anomaly alerts

  # ── Data warehouse (cross-platform reporting + ROAS @ SKU + MMM) ──────
  - postgresql-mcp                                    # warehouse for Triple Whale / Northbeam / Funnel.io / Improvado pipes + ROAS@SKU joins + MMM input CSV

  # ── Research / scraping (competitor ads, LP intel) ────────────────────
  - firecrawl-mcp                                     # Google Ads Transparency Center scrape + competitor LP scrape
  - brightdata-mcp                                    # paid SERP/web data fallback for Pathmatics-style intel

  # ── Translation (multi-market ad copy) ────────────────────────────────
  - deepl-mcp                                         # multi-language ad copy + LP translation for international campaigns

  # ── Creative gen (static + image + AI video handoff) ──────────────────
  - canva-mcp                                         # branded creative template instantiation (carousel, story, feed)
  - figma-mcp                                         # brand-system fidelity check + asset export to platforms
  - imagegen-mcp                                      # AI image gen for cold-traffic creative variants
  - stability-ai-mcp                                  # alt AI image gen
  - replicate-mcp                                     # AI video gen handoff path to video-creator (Sora/Veo/Kling/Flux)
  - elevenlabs-mcp                                    # voiceover for video ad creative

  # ── Landing page UX + CWV pre-launch check ────────────────────────────
  - playwright-mcp                                    # programmatic LP UX scan + mobile viewport check
  - browserbase-mcp                                   # remote browser for LP screenshot + form interaction audit

