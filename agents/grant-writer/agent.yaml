# Grant Writer — CraftBot agent definition
#
# Every field traces back to reference/SOTA_USE_CASES.md or to a default
# CraftBot capability already shipped on the recipient's install. See
# reference/INVENTORY.md for sources and SOURCES.md for the section→source map.

name: Grant Writer
slug: grant-writer
category: fundraising
tier: general
description: >
  End-to-end grant writing operator for nonprofits, fiscally sponsored
  projects, and social enterprises. Runs federal / state / foundation /
  corporate prospect research (Grants.gov + SAM.gov + Candid + Instrumentl
  + ProPublica 990s). Drafts LOIs, concept papers, full proposals
  (statement of need / project description / methods / evaluation / budget
  + budget narrative / sustainability). Builds logic models and theories
  of change. Owns federal compliance (2 CFR 200 OMB Uniform Guidance —
  Oct 2024 + May 2026 rewrites), SF-424 family forms, SF-LLL, indirect
  cost (15% de minimis MTDC or NICRA), matching funds, subaward
  monitoring, Single Audit prep ($1M post-Oct 2024 / $750K prior),
  fiscal sponsorship coordination. Manages multi-grant pipeline, deadline
  calendar, foundation cultivation cadence, declined-grant iteration.
  Hard rules: funder priorities outrank your project priorities — align
  or lose; logic models force clarity; reporting begins at award
  acceptance, not 11 months later. Defers binding accounting / audit to
  finance-controller, binding compliance interpretation to legal-counsel,
  donor-facing storytelling to marketing-agent, broader docs to
  technical-writer, board / exec strategy to ceo-agent.

tags:
  - grant-writing
  - fundraising
  - nonprofit
  - 501c3
  - federal-grants
  - foundation-grants
  - corporate-giving
  - csr
  - logic-model
  - theory-of-change
  - budget-narrative
  - 2-cfr-200
  - uniform-guidance
  - sf-424
  - nicra
  - single-audit
  - fiscal-sponsorship
  - instrumentl
  - candid
  - grants-gov
  - sam-gov
  - propublica-990

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills resolved at build time. Build script looks up names in
# agents/grant-writer/skills/ (bundled — Round 2 creates the contents)
# first, then top-level skills/ (CraftBot defaults — already on recipient).
enabled_skills:
  # ── Bundled (20) — SOTA grant-writing skill packs we ship with this agent ─
  # Round 2 creates each skills/<name>/SKILL.md.
  - grant-prospect-research-grants-gov-instrumentl-candid  # Grants.gov + SAM.gov APIs + Candid + Instrumentl + GrantStation + ProPublica 990
  - loi-letter-of-inquiry-drafting                         # 2-3 page LOI structure + funder-priority match + PO outreach
  - full-grant-proposal-narrative-methods-evaluation       # 8-section proposal + AI assist (Grantable/GrantBoost/Instrumentl)
  - logic-model-inputs-activities-outputs-outcomes         # 5-column logic model + Theory of Change (Sopact wizard, Kellogg guide)
  - budget-narrative-justification                         # 2 CFR 200 Subpart E + SF-424A pairing + reviewer-readable narrative
  - irs-501c3-compliance-docs                              # IRS EO search + ready-attach packet (determination letter, 990s, policies)
  - grant-deadline-calendar-management                     # Instrumentl (≥10) or Google Calendar+Notion+Airtable (<10) pipeline
  - grants-gov-sam-gov-submission                          # SAM.gov entity reg + Workspace SF-424 prep + Playwright UI walkthrough
  - grant-reporting-interim-final                          # SF-425 FFR + SF-PPR + funder-portal narrative; reconcile to GL
  - foundation-cultivation-program-officer                 # Multi-touch cadence + PO call before LOI + CRM tracking
  - federal-grant-compliance-omb-uniform-guidance          # 2 CFR 200 Subparts A-F + NIH 45 CFR 75 + 2026 OMB rewrite
  - corp-giving-csr-bumblebee-goodera                      # Benevity + YourCause + Bonterra + Goodera + MovingWorlds + CSR-report mining
  - matching-funds-in-kind-strategy                        # 2 CFR 200.306 + Independent Sector volunteer rates + in-kind letter templates
  - indirect-cost-nicra                                    # De Minimis 15% MTDC vs NICRA (HHS PSC / DOI IBC) negotiation
  - sf-424-sf-lll-subaward                                 # SF-424 family + SF-LLL lobbying + 2 CFR 200.331 subrecipient monitoring
  - multi-grant-pipeline-mgmt                              # Stage tracking (research → cultivate → draft → submit → decide → report)
  - fiscal-sponsorship-coordination                        # Model A/C/F + NEO/Fractured Atlas/PPF/Community Initiatives selection
  - single-audit-prep-federal-750k                         # $1M post-Oct-2024 + SF-SAC + fac.gov + SEFA prep (defers to finance-controller)
  - capital-campaign-capacity-equipment-grants             # Case for support + quiet/public phases + Kresge/Hewlett/Packard patterns
  - declined-grant-iteration                               # 30-day feedback request + portfolio-level pattern tracking + portfolio pivot

  # ── CraftBot defaults (20) — already on recipient's install ────────────
  # Always evaluate (per METHODOLOGY.md default skills audit checklist):
  - cli-anything                                           # universal verb — Grants.gov / SAM.gov / ProPublica / eCFR / Candid / Instrumentl REST
  - file-format                                            # convert .docx / .pdf / .md / .xlsx between formats for proposals + attachments
  - file-organizer                                         # organize active-proposal folders, funder library, declined-grant archive
  - using-git-worktrees                                    # isolate per-grant proposal branches in a versioned proposals repo

  # Content / writing (the bulk of the role's output):
  - docx                                                   # primary output for narratives + budget justifications + LOIs
  - pdf                                                    # fillable SF-424 family + final-stamp PDFs for upload
  - pptx                                                   # site-visit decks + funder-meeting briefings + board grant updates
  - markdown-converter                                     # cross-convert drafts; markdown is the working format
  - writing-skills                                         # general writing discipline + voice control
  - writing-plans                                          # multi-section proposal outlining
  - writing-assistant                                      # collaborative drafting flow for sections
  - brainstorming                                          # problem-statement framing + need-statement generation
  - concise-planning                                       # multi-month grant-cycle planning
  - ask-questions-if-underspecified                        # clarify org type / funding mix / deadlines before drafting
  - audit-context-building                                 # gather org context rigorously before claiming outcomes
  - verification-before-completion                         # quality-gate every proposal against funder NOFO before delivery

  # Spreadsheet (budget work is heavy spreadsheet):
  - xlsx                                                   # SF-424A, multi-year budget, SEFA, pipeline tracker, declined-grant analysis
  - google-sheets                                          # shared budget collaboration with finance + program leads

  # Comms (cultivation + submission notifications):
  - gmail                                                  # cultivation emails, PO outreach, declined-grant feedback requests
  - notion                                                 # multi-grant pipeline DB, foundation profile cards, PO relationship notes
  - obsidian                                               # local-first alt for sensitive funder strategy notes
  - google-drive                                           # shared proposal drafts with org leadership + program staff

  # Research (heavy research load — funder research, peer-org research, regulator research):
  - research-assistant                                     # broader research discipline
  - web-search-plus                                        # broad funder + sector + regulator search
  - tavily-search                                          # high-quality search for federal NOFOs + foundation pages
  - firecrawl                                              # scrape funder pages, CSR reports, NOFOs
  - playwright-mcp                                         # guided UI walkthrough of Grants.gov Workspace + Submittable + Fluxx + Foundant

  # Versioning + comms tooling:
  - git-commit                                             # version-control proposal drafts + budgets
  - github                                                 # store organizational proposal library + templates in a repo
  - differential-review                                    # structured peer review of proposal drafts before submission

# MCP servers — every name verified against app/config/mcp_config.json.
# The recipient enables each in MCP settings after import and fills in any
# required API keys.
mcp_servers:
  - filesystem                                             # always — read/edit proposals, budgets, attachments

  # ── Research + scrape (funder pages, NOFOs, CSR reports, eCFR) ───────
  - firecrawl-mcp                                          # scrape Grants.gov NOFO HTML, foundation priorities, CSR reports
  - brightdata-mcp                                         # alt scrape for paywalled foundation databases / heavy CAPTCHA sites
  - sec-edgar-mcp                                          # public-company 10-K / ESG sections for corporate giving research

  # ── Comms (cultivation, PO outreach, declined-grant follow-up) ────────
  - gmail-mcp                                              # cultivation emails + PO outreach + feedback-request emails
  - outlook-mcp                                            # alt for org on Microsoft 365
  - slack-mcp                                              # team grant comms (deadline alerts, awarded/declined notifications)

  # ── Workspace (proposal drafts, calendar, shared drives) ──────────────
  - google-calendar-mcp                                    # grant deadline calendar with PO touch-point reminders
  - google-drive-mcp                                       # shared proposal drafts with org leadership / program staff
  - google-workspace-mcp                                   # Docs + Sheets + Calendar in one OAuth (alt to per-product MCPs)
  - notion-mcp                                             # multi-grant pipeline DB + foundation profile cards + relationship notes

  # ── Accounting + reporting (financial data for budget + reports + SEFA) ─
  - xero-mcp                                               # GL pull for grant reports + SEFA prep + budget actuals
  - stripe-mcp                                             # donations + program revenue (fee-for-service nonprofits)
  - postgresql-mcp                                         # query org data warehouses for outcomes / beneficiary metrics

  # ── OCR (extract from scanned PDFs of legacy proposals, 990s, board minutes) ─
  - gemini-ocr-mcp                                         # OCR for image-only PDFs
  - mistral-ocr-mcp                                        # alt OCR for redundancy

  # ── Translation (international funders + multi-lingual community letters) ─
  - deepl-mcp                                              # high-quality translation for proposals + community impact letters

  # ── Data / outcomes evidence ─────────────────────────────────────────
  - huggingface-mcp                                        # discover outcome datasets / evaluation evidence

  # ── UI walkthrough (Grants.gov Workspace + Submittable + Fluxx + Foundant) ─
  - playwright-mcp                                         # guided UI flow when funder portal lacks an API (most foundations)

  # ── GitHub for organizational proposal library + templates ────────────
  - github                                                 # store proposal library + budget templates + LOI templates in a repo

