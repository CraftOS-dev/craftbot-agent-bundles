# Competitive Intelligence — CraftBot agent definition
#
# Every field traces back to reference/SOTA_USE_CASES.md or to a default
# CraftBot capability. See reference/INVENTORY.md for sources, SOURCES.md
# for section→source map.
#
# Tier: specialized — narrower than research-analyst (parent), focused on
# continuous competitor monitoring + battlecard + win/loss + sales adoption.

name: Competitive Intelligence
slug: competitive-intelligence
category: research
tier: specialized
description: >
  Competitive intelligence operator for B2B / SaaS / consumer companies.
  Runs continuous competitor monitoring across pricing pages, changelogs,
  ad libraries, social, reviews, hiring, M&A, and patents; authors and
  maintains battlecards in sync with win/loss data; ships kill sheets,
  war-game playbooks, and deal-level CI cards into Slack and Salesforce.
  Defaults to ethical, public-source-only methodology (SCIP code-compliant)
  — never social-engineers, scrapes behind logins, or pretexts.
  Specialist sibling of research-analyst (parent). Hand off broader
  scientific lit, market sizing, and trend-fan-out to research-analyst.
tags:
  - competitive-intelligence
  - battlecards
  - win-loss-analysis
  - kill-sheets
  - intent-data
  - competitor-monitoring
  - sales-enablement
  - product-marketing
  - klue-crayon-kompyte
  - scip-ethical-ci

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills resolved at build time. Build script looks up names in
# agents/competitive-intelligence/skills/ (bundled) first, then top-level skills/.
enabled_skills:
  # ── Bundled (23) — SOTA CI skill packs we ship with this agent ─────────
  # Round 2 (runtime build) creates each SKILL.md. Names referenced here
  # match folders under agents/competitive-intelligence/skills/<name>/.
  - continuous-competitor-monitoring-klue-kompyte-crayon  # daily monitoring across 8+ source types; Klue/Crayon/Kompyte if paid, free self-build via Visualping + ai-news + reddit + GDELT
  - competitor-product-teardown-depth                     # in-product walkthrough + IA + state machine + activation-moment timing
  - feature-parity-tracking                               # YAML/CSV per-feature matrix with versioned diffs + changelog watch
  - competitor-pricing-tier-comparison                    # public pricing-page scrape + per-tier grid + diff history + Reddit/G2 chatter overlay
  - win-loss-ci-integration-klue-insider                  # Klue Win/Loss path + self-build Whisper + LLM coding + Salesforce loop
  - battlecard-authoring-maintenance                      # per-competitor battlecard template + refresh-on-signal rules
  - competitor-messaging-tracking-diff                    # weekly homepage + LP diff with positioning/claims/pricing/category-language classifier
  - kill-sheet-objection-rebuttals                        # review-mined objections + PMM-approved rebuttals + quarterly refresh
  - war-games-competitive-mock-scenarios                  # pre-mortem attack-vector generation + red-team response playbook
  - intent-data-bombora-g2-zoominfo                       # Bombora category + G2 vendor-specific + ZoomInfo + 6sense Surge integration
  - competitor-hiring-intel-linkedin-sales-nav            # LinkedIn Sales Nav saved-search + careers-page scrape + Glassdoor signal
  - competitor-tech-stack-builtwith-wappalyzer            # BuiltWith historical + Wappalyzer fingerprint + DetectZeStack + python-Wappalyzer
  - competitor-ad-pathmatics-spyfu-semrush                # free official ad libraries first + SpyFu / Pathmatics paid uplift
  - competitor-seo-ahrefs-semrush-organic                 # Ahrefs backlinks + SEMrush keywords + Similarweb traffic + DataForSEO SERP
  - competitor-app-intel-sensor-tower-data-ai             # Sensor Tower (post-data.ai merger) + Apptopia + Appfigures
  - competitor-review-g2-trustradius-capterra             # Apify Review Intelligence + PageCrawl velocity + post-G2-Capterra-merger landscape
  - competitor-pricing-page-visualping-distill            # element-level pricing-page diff + webhook → Slack
  - competitor-m-a-funding-crunchbase-pitchbook           # Crunchbase + PitchBook + Owler + CB Insights + SEC EDGAR fallback
  - ci-program-metrics-adoption-rate                      # battlecard open-rate + competitive win-rate + CI-influenced revenue
  - ci-delivery-slack-crm-klue-insider                    # in-CRM cards + Slack feed + weekly digest tri-layer delivery
  - ethical-public-source-methodology                     # SCIP Code of Ethics enforcement + per-deliverable provenance footer
  - hot-deals-ci-deal-level                               # deal-specific micro-battlecard on Salesforce competitor-field trigger
  - analyst-relations-watching-gartner-forrester          # MQ / Wave / IDC / Constellation diff + analyst-quote citation tracking

  # ── CraftBot defaults (24) — already on recipient's install ────────────
  # Web research, scraping, output formats, planning, CRM, comms.
  - cli-anything                       # universal verb for installing/running SOTA tools
  - file-format
  - file-organizer
  - using-git-worktrees
  - playwright-mcp                     # interact with JS-rendered pricing / SaaS in-product
  - brave-search                       # web search (privacy-respecting)
  - duckduckgo-search                  # alt web search
  - tavily-search                      # AI-optimized web search for triangulation
  - web-search-plus                    # broader multi-engine search
  - firecrawl                          # structured web scraping
  - ai-news-collectors                 # competitor press / release feeds
  - reddit-api                         # community signal + pricing chatter
  - linkedin                           # competitor hiring intel + Sales Nav export
  - salesforce-api                     # deal-level CI write-back + battlecard surface
  - slack                              # CI delivery feed + weekly digest
  - notion                             # battlecard storage + per-competitor pages
  - better-notion                      # higher-quality Notion ops (preferred)
  - gmail                              # weekly digest send + press-release inbox
  - docx                               # branded battlecard / kill-sheet / report export
  - pdf                                # PDF deliverables
  - pptx                               # QBR slides + war-game playbook
  - xlsx                               # feature-parity + pricing-tier comparison matrix
  - markdown-converter                 # source extraction for messaging diff
  - brainstorming                      # war-game divergent attack-vector generation
  - concise-planning                   # CI program planning + per-quarter roadmap
  - audit-context-building             # before-deliverable context gathering
  - ask-questions-if-underspecified    # clarify CI scope before kicking off monitoring
  - git-commit                         # version-control battlecards + matrices
  - github                             # OSS competitor repo intel
  - github-api                         # deeper GitHub queries

# MCP servers — every name must exist in app/config/mcp_config.json.
# Recipient enables each in CraftBot's MCP settings and adds API keys per provider.
mcp_servers:
  - filesystem                         # always

  # ── Authoritative public data sources ───────────────────────────────────
  - sec-edgar-mcp                      # SEC EDGAR — free public-company financials, M&A filings
  - uspto-mcp                          # USPTO patents — competitor R&D direction signal

  # ── Scraping + JS-rendered pages ───────────────────────────────────────
  - firecrawl-mcp                      # structured scraping for pricing / case studies / changelogs / reviews
  - brightdata-mcp                     # paid SERP / proxy for hard-to-reach public pages
  - playwright-mcp                     # JS-rendered LP / pricing toggles / in-product walkthroughs

  # ── Social + community signal ──────────────────────────────────────────
  - reddit-mcp                         # free community-signal fallback for social listening
  - twitter-mcp                        # X / Twitter free fallback
  - youtube-mcp                        # competitor video / demo / earnings call ingestion

  # ── Behavioral / CI-program metrics ────────────────────────────────────
  - posthog-mcp                        # own-product analytics for CI-influenced metrics
  - mixpanel-mcp                       # alt product analytics
  - amplitude-mcp                      # alt behavioral cohorts
  - postgresql-mcp                     # warehouse-side funnel data for CI program metrics

  # ── CI delivery layer ─────────────────────────────────────────────────
  - notion-mcp                         # battlecard storage + per-competitor pages
  - slack-mcp                          # real-time CI feed + weekly digest
  - gmail-mcp                          # weekly digest send + press-feed subscription
  - linear-mcp                         # CI program task tracking

  # ── OCR + translation for foreign-language CI ──────────────────────────
  - gemini-ocr-mcp                     # OCR competitor screenshots / scanned earnings reports
  - mistral-ocr-mcp                    # alt OCR engine
  - deepl-mcp                          # translate foreign-language competitor sources

  # ── Dataset / benchmark access (limited use) ───────────────────────────
  - huggingface-mcp                    # open benchmark datasets where competitor releases models

