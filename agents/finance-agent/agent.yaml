# Finance Agent — CraftBot agent definition
#
# Strategic finance / fractional CFO scope. PAIRS with finance-controller
# (operational / tactical). See reference/INVENTORY.md for the capability
# split. Every field traces back to reference/SOTA_USE_CASES.md or to a
# default CraftBot capability already shipped on the recipient's install.

name: Finance Agent
slug: finance-agent
category: finance
tier: general
description: >
  Senior strategic finance / fractional CFO for founders and finance teams.
  Owns capital allocation, fundraising strategy (priced equity vs SAFE vs
  venture debt vs revenue-based financing vs secondaries), term sheet review
  (NVCA Oct 2025 model), 409A valuation negotiation, M&A target screen + QoE
  due diligence, FP&A (three-statement driver-based modeling + scenario +
  Monte Carlo), capital structure optimization, treasury yield strategy,
  equity compensation design (pool + evergreen), pitch deck financial
  slides, board CFO package, investor data room curation, IPO readiness /
  S-1 prep, international expansion structure + transfer pricing, FX
  hedging, QSBS / R&D credit / holdco tax strategy, and CFO-voice
  investor updates. PAIRS with `finance-controller` (operational / tactical
  bookkeeping / monthly close / AR-AP). Hard rules: (1) cash burn is a
  feature only when it compounds returns — opportunity cost is the dollar's
  silent twin; (2) capital structure follows strategy, not vice versa;
  (3) be conservative on revenue, aggressive on COGS, brutal on
  capital allocation. Always discloses "consult a licensed CFO / CPA /
  qualified investment advisor for binding strategic-finance decisions" —
  the agent models, surfaces trade-offs, and drafts deliverables; humans
  approve binding actions.
tags:
  - finance
  - strategic-finance
  - fractional-cfo
  - cfo
  - fpa
  - fundraising
  - capital-allocation
  - term-sheet
  - m-and-a
  - 409a
  - treasury
  - capital-structure
  - ipo-readiness
  - investor-relations
  - equity-compensation
  - qsbs

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills resolved at build time. Build script looks up names in
# agents/finance-agent/skills/ (bundled — Round 2 creates the contents)
# first, then top-level skills/ (CraftBot defaults — already on recipient).
enabled_skills:
  # ── Bundled (22) — SOTA strategic-finance skill packs we ship with this agent ──
  # Round 2 creates each skills/<name>/SKILL.md.
  - three-statement-financial-model-tied        # IS / BS / CF driver-based; cohort-revenue
  - driver-based-revenue-modeling               # SaaS / e-com / marketplace; cohort × ACV × NRR
  - scenario-planning-monte-carlo               # base / bull / bear + sensitivity + Monte Carlo
  - capital-allocation-framework                # ROIC vs WACC ladder; reinvest / return / reserve
  - ltv-cohort-strategic                        # bottom-up cohort LTV by segment / channel
  - market-sizing-tam-sam-som-strategic         # bottom-up + top-down triangulation
  - fundraising-strategy-priced-safe-venture-debt-rbf  # decision tree by stage + revenue posture
  - 409a-valuation-negotiation                  # OPM / PWERM hybrid; preferred discount 12-25%
  - term-sheet-nvca-grade-review                # NVCA Oct 2025 model; clause-by-clause vs market
  - pitch-deck-financial-slides                 # 6-metric max; growth → unit econ → path to profit
  - investor-data-room-curation                 # Visible.vc / DocSend / Papermark + sequencing
  - board-cfo-financial-package                 # 10-slide Cube/Vena structure; T-28 prep
  - ma-target-screen-and-qoe                    # Bain/McKinsey screen + Finsider QoE pre-work
  - treasury-yield-ladder-risk-tier             # Rho / Public.com / Mercury Treasury / Brex Yield
  - capital-structure-debt-equity-mix-stage     # WACC + venture-debt / RBF / secondaries blend
  - tax-strategy-qsbs-rd-credit-holdco          # Big Beautiful Bill 2025 QSBS; MainStreet / Neo.tax
  - international-entity-transfer-pricing       # Stripe Atlas / Foothold America / BaseFirma
  - fx-hedging-strategies                       # Wise / Airwallex / Revolut Business / OANDA
  - ipo-readiness-s1-prep                       # Cross Country / Carta / EisnerAmper / Deloitte
  - strategic-partnership-jv-structuring        # EY / Ankura five-essential JV framework
  - equity-comp-design-pool-evergreen           # 10-20% initial pool; 3-5% annual evergreen
  - investor-update-cfo-voice                   # Visible.vc Standard + YC variant; CFO voice

  # ── CraftBot defaults (24) — already on recipient's install ─────────────
  # Always evaluate (per METHODOLOGY.md default skills audit checklist):
  - cli-anything                            # universal verb for Carta/Pulley/Knolli/Causal/Mosaic/MainStreet REST
  - file-format                             # convert decks / term sheets / models between formats
  - file-organizer                          # organize data rooms + audit binders
  - using-git-worktrees                     # isolated worktree per workstream (e.g., Series-A-raise)

  # Content / comms (strategic CFO delivers a lot of decks + memos + emails):
  - docx                                    # term sheet review memos, board memos, M&A LOIs
  - pdf                                     # board deck PDF, pitch deck PDF, data-room PDF assets
  - pptx                                    # pitch deck, board CFO package, fundraising deck
  - xlsx                                    # three-statement model, scenarios, cap structure, sensitivity
  - google-sheet                            # live shared models for board/team collaboration
  - microsoft-excel                         # local Excel for sensitive cap-structure / M&A work
  - gmail                                   # investor outreach, board updates, LP comms
  - notion                                  # strategic-finance wiki / decision logs / playbooks
  - obsidian                                # alt local-first for sensitive M&A / fundraise drafts

  # Existing finance defaults that ship:
  - xero                                    # Xero via Maton-managed gateway (for actuals feed)
  - stripe-api                              # Stripe via Maton gateway (revenue + Sigma)
  - stock-forecast                          # Public-comp / peer multiples / market read
  - stock-market-pro                        # Alt market data layer

  # Research + planning (strategic CFO spends substantial time researching):
  - brainstorming                           # Hypothesis generation for capital structure / M&A
  - concise-planning                        # Plan fundraise / M&A / IPO-prep timelines
  - ask-questions-if-underspecified         # Clarify stage / ARR / horizon before computing
  - audit-context-building                  # Rigorous context-gathering before strategic memo
  - verification-before-completion          # Tie out scenarios before delivering

  # Versioning / collaboration:
  - git-commit                              # Version-control strategic models + decision logs
  - markdown-converter                      # Convert finance docs across formats

# MCP servers — every name must exist in app/config/mcp_config.json
# (verify.py checks this). The recipient enables each in their MCP settings
# after importing the .craftbot bundle and fills in any required API keys.
mcp_servers:
  - filesystem                              # always

  # ── Accounting + billing actuals feed (shared with finance-controller) ─
  - xero-mcp                                # actuals feed for FP&A model
  - stripe-mcp                              # revenue + Sigma queries for unit econ + pricing

  # ── Public + private market research (heavy use for this agent) ───────
  - sec-edgar-mcp                           # peer financials, IPO comparables, M&A comps, market sizing
  - octagon-sec-mcp                         # alt SEC research / private-market comparables
  - yahoo-finance-mcp                       # public-comp stock data + yield curve
  - alpha-vantage-mcp                       # alt market data
  - mcp-finance                             # multi-source finance data aggregator
  - tradingview-mcp                         # public-comp charting + technicals

  # ── Product analytics (cohort retention, NRR, segment economics) ───────
  - posthog-mcp                             # cohort + NRR + churn fetch
  - mixpanel-mcp                            # alt product analytics
  - amplitude-mcp                           # alt behavioral cohorts

  # ── Database / GL access ─────────────────────────────────────────────
  - postgresql-mcp                          # raw GL / warehouse queries for custom cohort joins

  # ── Comms (investor updates, board, vendor, M&A counterparty) ────────
  - gmail-mcp                               # investor updates + LP comms + M&A outreach
  - outlook-mcp                             # alt for recipients on Outlook
  - notion-mcp                              # strategic-finance wiki + decision logs + board prep
  - slack-mcp                               # finance team / advisor / counsel comms

  # ── Research / scrape / OCR (peers, term sheets, contracts) ──────────
  - firecrawl-mcp                           # peer / competitor / industry-report scrape
  - brightdata-mcp                          # alt paid scrape (PitchBook-style benchmark data)
  - huggingface-mcp                         # industry benchmark datasets
  - gemini-ocr-mcp                          # OCR for term sheets / contracts / M&A LOIs
  - mistral-ocr-mcp                         # alt OCR engine

