model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills are resolved at build time:
#   1. agents/compliance-agent/skills/<name>/  (bundled — ships INSIDE the .craftbot)
#   2. <repo>/skills/<name>/                    (CraftBot default — already on recipient's install)
#   A missing skill (in neither location) causes a build error.
enabled_skills:
  # ── Bundled (25) — SOTA compliance skill packs we ship with this agent ──
  # Round 2 will populate each folder under agents/compliance-agent/skills/<name>/
  # with a SKILL.md. The names below are reserved and referenced from soul.md
  # / role.md / SOTA_USE_CASES.md.
  - drata-vanta-secureframe-soc2-monitoring          # SOC 2 + multi-framework GRC automation (Vanta/Drata/Secureframe/Sprinto/Thoropass)
  - iso-27001-isms-readiness                         # ISO/IEC 27001:2022 ISMS prep + 27017/27018/27701 add-ons
  - gdpr-article-30-ropa-dpia                        # GDPR core: ROPA + DPIA + LIA + TIA
  - ccpa-cpra-dsar-workflows                         # DSAR / DSR handling (Transcend/Securiti/DataGrail/OneTrust DSR/Ketch)
  - hipaa-risk-assessment-baa                        # HIPAA Security Rule risk analysis + BAA
  - pci-dss-scope-reduction-saq-selection            # PCI DSS v4.0 scope + tokenization + SAQ selection
  - aml-kyc-bsa-ofac-fincen-fatf                     # AML program design (BSA/OFAC/FinCEN/FATF/MiCA)
  - customer-due-diligence-cdd-edd-sumsub-persona-jumio   # KYC vendor integration (Sumsub/Persona/Jumio/Onfido/Trulioo/Veriff/Alloy)
  - sanctions-transaction-monitoring-comply-advantage     # Sanctions + TM + SAR (ComplyAdvantage/Chainalysis/Elliptic/Refinitiv/Dow Jones)
  - vendor-risk-bitsight-securityscorecard-upguard   # TPRM platform integration (BitSight/SecurityScorecard/UpGuard/Vanta Vendor)
  - tprm-third-party-risk-lifecycle                  # TPRM lifecycle (sourcing → offboarding)
  - pentest-coordination-hackerone-bugcrowd          # Pentest + bug bounty (HackerOne/Bugcrowd/Cobalt/Synack/Intigriti)
  - vulnerability-mgmt-tenable-qualys-snyk           # VM platforms (Tenable One/Qualys VMDR/Rapid7 InsightVM/Snyk/GHAS)
  - security-awareness-training-knowbe4-hoxhunt      # Awareness training (KnowBe4/Hoxhunt/SoSafe/Living Security/Arsen)
  - phishing-simulation-program                      # Phishing sim (email/voice/SMS/QR/deepfake)
  - incident-response-nist-sp-800-61                 # IR plan + playbooks (NIST SP 800-61 r3 / CSF 2.0)
  - breach-notification-gdpr-72hr-state-laws         # Breach matrix (GDPR Art. 33/34 + US state + SEC 8-K + NYDFS + NIS2)
  - data-classification-dlp-purview-nightfall        # DLP + classification (Purview/Nightfall/Cyberhaven/Varonis)
  - data-retention-deletion-policy                   # Retention schedule + deletion runbook
  - policy-authoring-cybersecurity-aup-byod          # Policy library (cybersec/AUP/BYOD/AI use/remote/code of conduct)
  - ai-governance-eu-ai-act-eticas-credo             # AI governance (EU AI Act + NIST AI RMF + ISO 42001 + Credo/Holistic/Robust)
  - whistleblower-program-navex-ethicspoint          # Whistleblower (EU Directive 2019/1937 + SOX 806; NAVEX/Lighthouse/Convercent/FaceUp)
  - risk-register-maintenance-scoring                # Risk register (NIST 800-30 / ISO 27005 / FAIR / OpenFAIR)
  - regulatory-horizon-scanning-eu-ai-act-dora-nis2  # Quarterly horizon brief (DORA/NIS2/EU AI Act/state privacy)
  - vendor-security-questionnaire-caiq-sig           # CAIQ v4 / SIG (Lite/Core/Plus) answering + Trust Centers

  # ── CraftBot defaults (16) — already on recipient's install ────────────
  # Document I/O, file ops, research, writing assistance, review discipline.
  - cli-anything                                     # universal verb — install Vanta/Drata CLIs, curl regulator APIs, OFAC SDN, CNIL PIA tool, OpenVAS, etc.
  - compliance-cert-planner                          # default CraftBot skill — applicability + roadmap + shared controls matrix
  - supply-chain-risk-auditor                        # default — dependency risk audit for OSS / supply chain
  - file-format                                      # convert .docx / .pdf / .md / .xlsx for evidence intake
  - file-organizer                                   # organize a workspace of audit evidence, policies, vendor docs
  - docx                                             # produce Word output (default for policies + audit reports)
  - pdf                                              # produce PDF for auditor + regulator delivery
  - pptx                                             # produce board-level compliance + risk briefings
  - xlsx                                             # produce Excel for risk register + control matrix + vendor inventory
  - markdown-converter                               # cross-convert markdown for memos + policies + playbooks
  - writing-skills                                   # general writing discipline for memos + reports
  - writing-plans                                    # structured drafting plans for long policy libraries
  - writing-assistant                                # collaborative drafting flow
  - brainstorming                                    # use-case exploration before control / policy design
  - concise-planning                                 # plan multi-step compliance audits + roadmap
  - research-assistant                               # regulator + standard + secondary-source research
  - web-search-plus                                  # broad regulator + comparison-blog search
  - tavily-search                                    # high-quality search for source material
  - firecrawl                                        # scrape regulator pages (ICO, EDPB, CPPA, FTC, FinCEN, OFAC, NCSL, EU Commission)
  - verification-before-completion                   # quality-gate every audit report / policy / memo before delivery
  - prompt-engineering-expert                        # structure prompts to Vanta AI / Drata AI / Loopio
  - github                                           # repo IaC review for secret scanning + CodeQL + Dependabot
  - github-api                                       # raw GitHub API for SAST + dependency + secret + SBOM
  - using-git-worktrees                              # isolate audit-evidence branches in versioned doc repos
  - differential-review                              # structured review of policy redlines / audit PRs

# MCP servers — every name verified against app/config/mcp_config.json.
# The recipient enables each in MCP settings after import and fills in any
# required API keys.
mcp_servers:
  - filesystem                                       # read/edit policies, audit reports, evidence packets
  - firecrawl-mcp                                    # fetch frequently-changing regulator pages (ICO, EDPB, CPPA, Cal AG, NCSL, FinCEN, OFAC, FATF, FINRA, SEC, FDA, EU Commission, IAPP)
  - gemini-ocr-mcp                                   # extract text from scanned policies + audit exhibits
  - mistral-ocr-mcp                                  # alt OCR for redundancy
  - notion-mcp                                       # write audit reports / risk registers / vendor inventories / CSIRT rosters
  - gmail-mcp                                        # vendor security questionnaires + auditor comms + DSAR verification + breach notifications
  - google-drive-mcp                                 # read/write evidence packets + policy library
  - google-workspace-mcp                             # Docs (policies) + Sheets (risk register, vendor inventory, evidence tracker)
  - github                                           # repo scanning for secrets, vulnerabilities, IaC, supply-chain
  - splunk-mcp                                       # SIEM query for audit evidence + incident forensics
  - sentry-mcp                                       # error / incident telemetry for IR
  - cloudflare-mcp                                   # WAF / DDoS / Bot management evidence
  - aws-s3-mcp                                       # log retention buckets + audit evidence storage
  - kubernetes-mcp                                   # container security posture evidence
  - shodan-mcp-full                                  # external attack surface for TPRM + own-surface discovery
  - virustotal-mcp                                   # IOC lookup + malware analysis for IR
  - sec-edgar-mcp                                    # public-company peer cyber 8-K benchmarks
  - deepl-mcp                                        # multi-jurisdiction translation (EU + US + LATAM + APAC)

