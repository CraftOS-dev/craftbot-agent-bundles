# QA / Test Engineer — CraftBot agent definition
#
# Every field traces back to web-researched SOTA references (cited in
# reference/SOTA_USE_CASES.md and SOURCES.md) OR to a default CraftBot capability
# already shipped on the recipient's install. See reference/INVENTORY.md for
# provenance and reference/SOTA_USE_CASES.md for per-use-case SOTA mapping.

name: QA / Test Engineer
slug: qa-engineer
category: engineering
tier: specialized
description: >
  QA / test engineer for the 2026 stack. Authors test plans (ISO 29119 + HTSM),
  curates regression suites (Playwright + pytest), runs accessibility (axe-core /
  pa11y / Lighthouse WCAG 2.2 AA), performance (k6 / Locust / Artillery), API
  (Bruno / Postman / Newman), contract (Pact + can-i-deploy), and security
  (OWASP ZAP / Snyk) tests; manages flaky-test quarantine, mutation testing
  (Stryker / mutmut), visual regression (Playwright native / Applitools /
  Chromatic), cross-browser (Playwright + BrowserStack/Sauce), and mobile
  (Maestro / Detox / Appium). Owns quality KPIs (escape rate, MTTR, flakiness)
  and the release-readiness checklist. Defers to `senior-python-engineer` for
  app-code unit tests, `frontend-engineer` for component tests, and
  `devops-engineer` for CI infrastructure.
tags:
  - qa
  - testing
  - e2e
  - playwright
  - cypress
  - pytest
  - jest
  - vitest
  - accessibility
  - wcag
  - performance
  - k6
  - locust
  - api-testing
  - bruno
  - postman
  - contract-testing
  - pact
  - security-testing
  - owasp-zap
  - visual-regression
  - flaky-tests
  - mutation-testing
  - stryker
  - mutmut
  - test-data
  - quality-gates
  - shift-left
  - release-readiness
  - dora

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills are resolved at build time:
#   1. agents/qa-engineer/skills/<name>/  (bundled — ships INSIDE the .craftbot)
#   2. <repo>/skills/<name>/              (CraftBot default — already on recipient's install)
enabled_skills:
  # ── Bundled (23) — SOTA QA skill packs we ship with this agent ─────────
  # Round 2 creates each folder's SKILL.md. Bundle scope drawn from
  # reference/SOTA_USE_CASES.md SOTA tooling per use case.
  - test-plan-authoring-pmbok-iso           # ISO 29119-3 plan + HTSM risk model
  - test-case-authoring-bdd-gherkin         # Cucumber / pytest-bdd / Playwright-bdd
  - exploratory-testing-charters-session-based  # Bach/Bolton SBTM
  - regression-suite-curation-smoke-critical    # smoke / critical / extended pyramid
  - accessibility-testing-wcag-22-aa-axe    # axe-core + pa11y + Lighthouse + NVDA/JAWS/VoiceOver
  - performance-testing-k6-locust-artillery # k6 (JS), Locust (Py), Artillery; Gatling fallback
  - api-testing-postman-bruno-newman        # Bruno (Git-native) + Postman + Newman + Insomnia
  - contract-testing-pact                   # Pact + Pact Broker + can-i-deploy
  - security-testing-owasp-zap-burp         # ZAP CI (SARIF) + Burp Pro + Snyk/pip-audit
  - uat-coordination                        # acceptance criteria + sign-off + Loom evidence
  - test-data-management-synthetic          # Faker + Mockaroo + Tonic.ai GDPR-safe
  - defect-triage-severity-priority         # S1-S4 x P0-P3 matrix + SLA
  - cross-browser-browserstack-saucelabs-lambdatest  # Playwright native + cloud grids
  - mobile-testing-real-devices-emulators   # Maestro + Detox + Appium + WebdriverIO
  - visual-regression-percy-chromatic-applitools  # Playwright toHaveScreenshot + Eyes/Chromatic/Percy
  - test-pyramid-governance                 # Pyramid vs Trophy + suite-size SLOs
  - flaky-test-quarantine-root-cause        # detect / quarantine / heal / 2-week fix-or-remove
  - ci-cd-test-integration-parallelization  # GH Actions matrix + Playwright sharding + pytest-xdist
  - test-reporting-dashboards               # Allure + ReportPortal + Playwright HTML + Grafana k6
  - release-readiness-checklists            # DORA gate + branch protection + go/no-go
  - mutation-testing-stryker-mutmut         # Stryker (JS/.NET) + mutmut (Py) + Pitest (JVM)
  - qa-dev-shift-left                       # 3-amigo + TDD/BDD in PR + retro KPI review
  - quality-kpis-escape-rate-mttr           # escape rate + MTTR + flakiness + coverage trends

  # ── CraftBot defaults (12) — already on recipient's install ─────────────
  - cli-anything                            # universal verb — runs k6, axe, ZAP, mutmut, allure, etc.
  - file-format                             # convert reports (JUnit XML, JSON, HTML)
  - file-organizer                          # tidy fixtures / reports / artifacts trees
  - using-git-worktrees                     # isolate suite work / quarantine branches
  - git-commit                              # conventional commits on test-suite changes
  - github                                  # gh CLI — issues, PRs, CI runs
  - github-api                              # raw API for SARIF uploads + status checks + branch rules
  - debug-pro                               # 7-step debugging — repro flaky / failing tests
  - systematic-debugging                    # generic method before naming a "fix"
  - test-driven-development                 # red/green/refactor + name-the-test-that-would-have-caught-it
  - property-based-testing                  # Hypothesis-style coverage beyond examples
  - mutation-testing                        # complements bundled `mutation-testing-stryker-mutmut`
  - playwright-mcp                          # Playwright orchestration for E2E + a11y + visual + cross-browser
  - verification-before-completion          # release-readiness self-check before signing off

# MCP servers — every name verified against app/config/mcp_config.json.
# Recipient enables each in their MCP settings after importing the bundle
# and provides any required API keys.
mcp_servers:
  - filesystem                              # always — read/edit test files, configs, reports
  - github                                  # PRs, status checks, SARIF, branch protection
  - playwright-mcp                          # browser orchestration for E2E + a11y + visual + cross-browser
  - postgresql-mcp                          # test DB inspection, fixture seeding, schema diff
  - sentry-mcp                              # prod errors + escape-rate correlation + flaky source signals
  - kubernetes-mcp                          # ephemeral test environments (namespace per PR)
  - jira-mcp                                # defect triage, ticket lifecycle, UAT scenarios
  - linear-mcp                              # same purpose for Linear shops
  - notion-mcp                              # UAT sign-off, test plans, retros, KPI digests
  - slack-mcp                               # smoke failure alerts, escape-rate weekly digest
  - posthog-mcp                             # product-side defect signals + escape-rate correlation

