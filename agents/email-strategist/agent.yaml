# Email Strategist — CraftBot agent definition
#
# SPECIALIZED TIER under marketing-agent. Deep email lifecycle +
# deliverability specialist. Drills beyond the parent on advanced
# segmentation, DMARC reporting, IP warming, BIMI / VMC, post-MPP
# measurement, transactional/marketing separation, IP reputation,
# multi-ESP architecture, MJML / Maizzle modular design, dynamic
# personalization, newsletter creator economics.
#
# Three load-bearing convictions: (1) Inbox placement is everything —
# a 50% open rate to spam is a 0% real open rate. (2) Segmentation
# beats broadcast — every send needs ≥ 2 segmentation attributes.
# (3) Open rates are dead post-MPP — measure clicks, conversions,
# revenue per email.
#
# Every field traces back to reference/SOTA_USE_CASES.md. See
# SOURCES.md for the section→source map.

name: Email Strategist
slug: email-strategist
category: marketing
tier: specialized                # specialized under marketing-agent
description: >
  Senior email lifecycle + deliverability specialist for teams running
  serious volume. Drills deeper than marketing-agent on advanced
  segmentation (RFM, predictive churn, LTV bands), Klaviyo predictive
  AI, IP warming, DMARC implementation + report parsing (Valimail /
  dmarcian / Postmark DMARC), BIMI / Verified Mark Certificate setup,
  Google Postmaster + Microsoft SNDS IP reputation monitoring, post-MPP
  measurement (clicks > opens), transactional/marketing separation
  (separate ESP, domain, IP pool), multi-language architecture (ICU
  MessageFormat), MJML / Maizzle modular design, dynamic personalization
  (Movable Ink + AMP for Email), and Beehiiv / Substack newsletter
  creator economics. White-hat + consent-as-infrastructure only.
  Defers to marketing-agent (broader marketing, top-of-funnel acquisition),
  sales-agent (cold outbound — different game, different rules),
  customer-support-agent (transactional support content), data-analyst
  (deep cohort analysis on email performance).
tags:
  - email
  - lifecycle
  - deliverability
  - dmarc
  - bimi
  - ip-warming
  - segmentation
  - klaviyo
  - customer-io
  - resend
  - postmark
  - hubspot
  - newsletter
  - post-mpp
  - transactional
  - mjml
  - maizzle
  - dynamic-content
  - movable-ink
  - accessibility

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# 23 bundled SOTA skill packs (Round 2 will populate SKILL.md contents).
# Each closes a documented use case from reference/SOTA_USE_CASES.md.
enabled_skills:
  # ── Bundled (23) — 2026 SOTA email-strategist skill packs ─────────────
  - klaviyo-deep-lifecycle-predictive-ai     # Klaviyo e-com deep (flows, segments, predictive AI, smart send time)
  - customer-io-b2b-lifecycle                # Customer.io B2B (event-driven campaigns, transactional, broadcasts)
  - resend-postmark-transactional-modern     # Resend + Postmark dev-focused transactional + React Email
  - mailgun-sendgrid-ses-volume-transactional  # Mailgun / SendGrid / SES / Mailchannels / SparkPost
  - deliverability-deep-spf-dkim-dmarc-bimi-arc  # full auth audit + ARC + remediation
  - dmarc-reporting-valimail-dmarcian        # RUA/RUF parsing + sender alignment (Valimail / dmarcian / Postmark)
  - bimi-verified-mark-certificate-setup     # BIMI + VMC procurement + DNS publication (DigiCert / Entrust)
  - ip-warming-strategy-dedicated-shared     # 4-6 week warming (Lemwarm / Mailflow / MailReach / Folderly)
  - ip-reputation-google-postmaster-snds     # Postmaster Tools v2 + SNDS + Yahoo Postmaster polling
  - list-cleaning-zerobounce-emailable       # ZeroBounce / Emailable / NeverBounce / BriteVerify / Kickbox
  - engagement-based-suppression             # engagement-tier definitions + send rules
  - multi-language-esp-architecture-icu      # per-locale templates + ICU MessageFormat + DeepL router
  - transactional-vs-marketing-separation    # DNS + IP + ESP architecture for stream separation
  - post-mpp-measurement-clicks-conversions-revenue  # clicks > opens + CTR/CTOR/revenue per recipient + GA4
  - ab-testing-subject-preview-copy-send-time  # Klaviyo A/B + GrowthBook for multi-variant
  - mjml-maizzle-responsive-modular-email    # MJML / Maizzle compile pipeline + push to ESP
  - dark-mode-email-design-accessibility     # dark mode tokens + WCAG AA + ARIA + alt text
  - glock-apps-inboxable-inbox-placement-testing  # pre-send seed-list placement
  - litmus-email-on-acid-rendering-testing   # cross-client render diff (90+ clients)
  - complaint-bounce-rate-management         # complaint rate < 0.10% target + alert thresholds
  - klaviyo-customer-io-flow-design-patterns  # named-flow templates + throttling + exit conditions
  - beehiiv-substack-newsletter-creator-strategy  # Beehiiv API + Substack migration + monetization
  - dynamic-personalization-movable-ink      # Movable Ink dynamic blocks + AMP for Email

  # ── CraftBot defaults (16) — already on recipient's install ───────────
  # Document output for deliverability audits, campaign decks, post-mortems.
  - docx                            # audit reports, executive summaries
  - pdf                             # deliverability audit PDFs, BIMI VMC briefs
  - pptx                            # email program review decks
  - xlsx                            # complaint/bounce/CTR dashboards, RFM exports
  - file-format                     # cross-format conversion
  - file-organizer                  # campaign asset organization

  # Web + competitive research, render testing.
  - playwright-mcp                  # render competitor newsletters, validate ESP UIs, AMP test
  - brave-search                    # deliverability tool research, ESP compare
  - firecrawl                       # competitor newsletter scraping

  # Ideation + planning.
  - brainstorming                   # subject line + preview text variants
  - concise-planning                # IP warming schedule, DMARC phased plan, sequence design

  # Cross-check + universal verb.
  - cli-anything                    # dig, curl mail-tester, mxtoolbox, Postmark spam check, jq, python, MJML/Maizzle, lemwarm/mailflow API
  - gemini                          # second-opinion model for copy / segment definitions

  # Version control for templates + DNS state.
  - git-commit                      # track template + DNS iterations
  - github                          # collaborative review on email PRs

# MCP servers — every name MUST exist in app/config/mcp_config.json.
# Recipient enables each in CraftBot MCP settings + adds credentials.
mcp_servers:
  - filesystem                      # always

  # ── Comms + alerting ──────────────────────────────────────────────
  - gmail-mcp                       # deliverability alerts, sender notifications, dig output emails
  - slack-mcp                       # complaint-rate / bounce / spam-rate alerts to ops channel

  # ── Knowledge + ticketing ─────────────────────────────────────────
  - notion-mcp                      # segment library, flow inventory, DMARC remediation tracker
  - linear-mcp                      # DMARC remediation tickets to engineering
  - jira-mcp                        # alt ticketing target

  # ── Data warehouse + product analytics ────────────────────────────
  - postgresql-mcp                  # RFM SQL, cohort joins, complaint-rate cron alerts
  - posthog-mcp                     # activation event source for onboarding triggers, retention
  - mixpanel-mcp                    # alt activation event source
  - amplitude-mcp                   # alt activation event source + behavioral cohorts

  # ── Research / scraping ───────────────────────────────────────────
  - firecrawl-mcp                   # competitor newsletter scrape
  - brightdata-mcp                  # paid scraping + SERP fallback
  - playwright-mcp                  # render competitor newsletters

  # ── Translation (multi-language email) ────────────────────────────
  - deepl-mcp                       # SOTA translation for per-locale templates

  # ── E-commerce + payments (event triggers for lifecycle) ──────────
  - shopify-mcp                     # cart / product / order event enrichment
  - stripe-mcp                      # subscription event triggers (renewal, churn)

