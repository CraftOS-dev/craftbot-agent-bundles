# Talent Sourcer — CraftBot agent definition
#
# SPECIALIZED TIER. Sits under operations-agent (parent — general business
# operations / hiring pipeline broadly). Drills into the upstream sourcing
# craft: LinkedIn Recruiter Boolean string authoring, GitHub talent mining,
# Stack Overflow + niche-board sourcing, SeekOut/Findem/AmazingHiring
# diversity sourcing, Gem/hireEZ/Beamery talent-CRM sequencing, cold InMail
# + warm intro authoring, hot-list / talent-community management, target
# company mapping, exec sourcing (CTO/VP-Eng), technical / designer / sales
# sourcing, contractor sourcing (Toptal/Turing/Pesto), boomerang + alumni
# re-engagement, source-of-hire reporting. Defers to operations-agent
# (parent — interview pipeline, scorecards, offer letters, ATS admin) and
# ceo-agent (executive hiring strategy + comp philosophy).
#
# Every field traces back to reference/. See reference/INVENTORY.md for
# sources and reference/SOTA_USE_CASES.md for per-use-case SOTA mapping.

name: Talent Sourcer
slug: talent-sourcer
category: operations
tier: specialized
description: >
  Senior talent-sourcer operator. Authors LinkedIn Recruiter Boolean search
  strings, mines GitHub for engineers (language + stars + commits +
  contribution graphs), sources via Stack Overflow reputation + tag depth,
  posts and pulls candidates from Wellfound / Built In / Hired / Otta,
  runs diversity sourcing through SeekOut / Findem / AmazingHiring +
  project-specific channels (/dev/color, Code2040, Black Founders, Lesbians
  Who Tech, Out in Tech), authors passive-candidate outreach sequences in
  Gem / hireEZ / Beamery, drafts cold InMails (<400 chars, 16-27 char
  subjects, profile-view-first), maps target companies via Crunchbase +
  Apollo, sources executives (CTO/VP-Eng) through Lusha + RocketReach +
  ContactOut, sources designers via Dribbble + Behance, sales talent via
  RepVue, contractors via Toptal / Turing / Andela / Arc.dev / Lemon.io,
  re-engages alumni / boomerang candidates, optimizes JDs via Textio /
  Datapeople, reports source-of-hire + funnel diversity by req, hands off
  to ATS (Greenhouse / Ashby / Lever) on Applied stage. Hard rules:
  Boolean search beats LinkedIn search filters by 10×; passive candidates
  are the talent; diversity sourcing requires intentional channels.
  Defers interview pipeline + offer letters + ATS admin to operations-agent
  (parent); executive hiring strategy + compensation philosophy to ceo-agent.
tags:
  - talent-sourcing
  - recruiting
  - linkedin-recruiter
  - boolean-search
  - github-sourcing
  - stack-overflow-sourcing
  - passive-candidates
  - diversity-sourcing
  - talent-crm
  - gem
  - hireez
  - beamery
  - seekout
  - findem
  - amazinghiring
  - exec-search
  - technical-sourcing
  - designer-sourcing
  - sales-sourcing
  - contractor-sourcing
  - boomerang
  - alumni
  - hot-list
  - talent-community
  - source-of-hire
  - jd-optimization

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# 22 bundled SOTA skill packs + 28 CraftBot defaults = 50 enabled skills.
# Each bundled pack closes a documented capability from
# reference/SOTA_USE_CASES.md. Round 2 (runtime build) creates the SKILL.md
# files under agents/talent-sourcer/skills/<name>/.
enabled_skills:
  # ── Bundled (22) — 2026 SOTA talent-sourcer skill packs ────────────────
  - linkedin-recruiter-boolean-search-strings  # Boolean authoring + 40-filter layering + AI Boolean builder fallback
  - github-talent-mining-language-stars-commits # REST/GraphQL user + repo + commit search; contributor extraction
  - stack-overflow-talent-reputation-tag       # Stack Exchange API reputation + top-tag filtering
  - hired-wellfound-built-in-otta-niche-boards # Wellfound/Built In/Otta/Hired posting + scraping
  - amazinghiring-findem-seekout-diversity     # diversity filter + 50+ network aggregation
  - gem-hireez-beamery-talent-crm              # CRM-driven sequence + ATS push
  - passive-candidate-outreach-campaigns       # 3-5 step sequence + segmentation + A/B
  - cold-inmail-warm-intro                     # <400 char InMail + 16-27 subject + warm intro via mutuals
  - hot-list-talent-community-mgmt             # readiness tags + nurture cadence + event coordination
  - target-company-mapping-crunchbase-linkedin # Crunchbase signal → Sales Nav → Apollo enrich
  - cto-vp-eng-exec-sourcing                   # exec ICP + Lusha/RocketReach/ContactOut + warm-intro routing
  - technical-sourcing-developer-focused       # AmazingHiring + SeekOut + GitHub commit history validation
  - product-designer-sourcing-dribbble-behance # Behance Hire Me + Dribbble for-hire + Twine + Toptal Design
  - sales-talent-sourcing-repvue               # RepVue rep filter + LinkedIn Sales Nav + comp-transparent outreach
  - source-to-contact-metrics                  # per-req funnel metrics, source-to-contact, contact-to-reply
  - source-of-hire-reporting                   # per-source attribution + weekly + monthly dashboard
  - candidate-experience-hygiene-response-time # 24h reply SLA + 7d stage SLA + auto-rejection templates
  - source-diversification-3-sources-per-role  # ≥3 sources per req + no single source >60% rule
  - employer-brand-in-outreach                 # recent funding + Glassdoor 4.0 floor + case study token rotation
  - diversity-channel-sourcing-dev-color-code2040 # project channels + conference cadence + warm intro pipeline
  - contractor-sourcing-toptal-turing-pesto    # vetted marketplace routing by urgency + budget + geography
  - boomerang-alumni-re-engagement             # alumni DB + 12-18 mo "we miss you" + auto-flag in ATS

  # ── CraftBot defaults (28) — already on recipient's install ───────────
  # Comms (candidate outreach + warm intros + recruiter-team coordination):
  - gmail                              # cold outreach + warm intro requests + candidate replies (low-scale fallback)
  - mailchimp                          # talent-community newsletters + alumni quarterly
  - linkedin                           # LinkedIn profile pulls + posting + connection sends

  # Workspace + tracking (candidate database + hot-list + persona library + alumni):
  - notion                             # candidate database, hot-list, persona library, alumni register, channel relationships
  - better-notion                      # high-fidelity Notion ops (block-level edits, complex queries)
  - obsidian                           # alt local-first DB for sensitive candidate notes
  - markdown-converter                 # JD ↔ formats for ATS uploads + Notion sync

  # Document output (JDs, offer-letter drafts, candidate brief packs):
  - docx                               # JD + recruiter brief + offer-letter draft (recruiter coord owns final)
  - pdf                                # candidate-brief pack export for hiring manager review
  - pptx                               # quarterly source-of-hire review deck for ops/CEO
  - xlsx                               # candidate pipeline + source-attribution + funnel metrics local Excel
  - google-sheet                       # live shared candidate pipeline + per-req source breakdown for team coord
  - file-format                        # convert résumés / portfolios between formats
  - file-organizer                     # JD archive + résumé archive + interview-pack archive

  # ATS handoff + sourcing-team task pipeline:
  - linear-api                         # per-req sourcing kanban + sourcing-team task pipeline
  - zoho-recruit                       # alt ATS handoff target (Zoho-shop recipients)

  # Research + planning + framing:
  - brainstorming                      # ICP hypothesis generation + sourcing-strategy ideation
  - concise-planning                   # weekly sourcing plan + req prioritization
  - ask-questions-if-underspecified    # clarify role + ICP + comp + diversity goals before sourcing
  - audit-context-building             # gather company stage + funding + employer-brand context for outreach
  - verification-before-completion     # source-mix verification + bias check before delivering shortlist
  - day-planner                        # daily sourcer cadence (outreach burst + reply triage)
  - week-planner                       # weekly source-diversification review + req prioritization
  - month-planner                      # monthly source-of-hire reporting + hot-list refresh

  # Search + scraping (employer brand research + candidate enrichment):
  - brave-search                       # current SOTA tool + market news backup
  - firecrawl                          # Behance / Dribbble / Wellfound / Glassdoor / Crunchbase scrape
  - web-search-plus                    # enhanced search with snippet extraction
  - playwright-mcp                     # LinkedIn Recruiter UI automation + Behance/Dribbble portfolio scrape

  # Cross-tool execution + writing quality:
  - cli-anything                       # universal verb: Gem / hireEZ / Beamery / SeekOut / Findem / AmazingHiring / Apollo / Clay / Lusha / RocketReach / Hunter / Findymail / RepVue / Crunchbase / Greenhouse / Ashby / Lever / Wellfound / Built In / Otta / Toptal / Turing / Arc.dev / Lemon.io / Textio / Datapeople REST
  - writing-skills                     # cold outreach + InMail + warm intro prose quality
  - writing-assistant                  # general editing
  - memory-processor                   # persist candidate + persona + alumni context across sessions

# MCP servers — 2026 SOTA talent-sourcer stack. Each platform MCP backs at
# least one use case from reference/SOTA_USE_CASES.md. Recipient enables
# in CraftBot MCP settings + provides OAuth/API keys per platform.
mcp_servers:
  - filesystem                         # read/edit JDs, candidate pipelines, recruiter briefs

  # ── Code / repo (GitHub talent mining + signal validation) ─────────────
  - github                             # GitHub user/repo/commit search; contributor extraction; activity scoring

  # ── Comms (outreach + warm intro + sequence fallback + candidate replies) ─
  - gmail-mcp                          # cold + warm + sequence-fallback outreach (low-scale)
  - outlook-mcp                        # alt for Outlook-shop recipients
  - google-workspace-mcp               # Gmail + Sheets + Calendar combined for team workflows
  - slack-mcp                          # warm intro DMs + internal coord + project-channel diversity community
  - discord-mcp                        # alt comms + Discord-first diversity channels
  - ms-teams-mcp                       # alt for Teams-shop recipients

  # ── Calendar / scheduling ──────────────────────────────────────────────
  - google-calendar-mcp                # outreach cadence + sponsor calendar + event registration + interview holds

  # ── Knowledge base / candidate database / hot-list / persona library ───
  - notion-mcp                         # candidate DB, hot-list, persona library, alumni register, channel relationships, ICP playbooks
  - obsidian-mcp                       # alt local-first KB for sensitive sourcing notes

  # ── Task + req pipeline ────────────────────────────────────────────────
  - linear-mcp                         # per-req sourcing kanban + sourcing-team task pipeline

  # ── Document storage / brief packs ─────────────────────────────────────
  - google-drive-mcp                   # JD storage + portfolio review + brief-pack archive

  # ── Research / scrape / OCR (employer-brand + candidate enrichment) ────
  - firecrawl-mcp                      # Behance / Dribbble / Wellfound / Crunchbase / Glassdoor scraping
  - brightdata-mcp                     # paid scrape for paywalled benchmarks (RepVue / SeekOut data)
  - playwright-mcp                     # LinkedIn Recruiter UI automation + portfolio scrape + form fill
  - gemini-ocr-mcp                     # résumé OCR for scanned applications
  - mistral-ocr-mcp                    # alt OCR engine
  - brave-search                       # current SOTA / news / market research backstop

  # ── Embedding-based clustering (candidate-fit + persona segmentation) ──
  - huggingface-mcp                    # embedding-based candidate-quality clustering + JD-to-candidate similarity

  # ── Analytics (outreach A/B + hot-list nurture + source-of-hire reporting) ─
  - posthog-mcp                        # outreach A/B test + newsletter analytics + hot-list nurture metrics

