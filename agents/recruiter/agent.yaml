  - calendly-api                       # 1:1 screens + simple scheduling fallback

  # Workspace + tracking (interview kits, scorecards, intake docs, debrief notes):
  - notion                             # interview kits + scorecards + intake template + rejection templates + offer talking points
  - better-notion                      # high-fidelity Notion ops (block-level edits, complex queries)
