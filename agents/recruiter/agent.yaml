  - candidate-pipeline-stage-management        # pipeline Applied→Hired + intake + stale candidate hygiene
  - recruiter-screen-30-min-behavioral         # 30-min structured screen + comp expectation + Zoom record
  - structured-interview-star-bar              # STAR/BAR structured behavioral + rubric authoring
  - interview-kit-rubric-weighted-scoring      # interview kit, weighted rubric, calibration meeting
  - interview-panel-goodtime-ashby-scheduling  # panel coord: Goodtime / Ashby / Calendly / Cal.com
  - interview-debrief-consensus                # debrief facilitation + consensus / disagree-and-commit
  - reference-checking-structured-3-questions  # Crosschq / Checkster / SkillSurvey + phone reference
  - offer-negotiation-comp-band-equity-perks   # Pave / Carta / Compa / Levels.fyi negotiation playbook
  - offer-letter-docusign-pandadoc             # DocuSign / PandaDoc template + e-sign + ATS attach
  - candidate-experience-sla-status-updates    # 24h reply SLA + status updates + structured rejection
  - employer-brand-glassdoor-comparably        # Glassdoor / Comparably review responses + testimonials
  - recruiting-metrics-time-to-fill-offer-accept # metrics dashboard + weekly sync + quarterly review
  - dei-hiring-diverse-slate-blind-resume      # diverse slate + panel diversity + Greenhouse Inclusion
  - structured-interview-training-hiring-managers # 90-min HM training + BrightHire / Metaview / Pillar
  - employer-brand-campaigns-career-site       # career site + EVP + structured-data SEO + employer brand
  - ai-screening-pinpoint-eightfold-with-care  # AI screening with bias audit + disclosure + legal review
  - employee-referral-program                  # ERIN / Teamable / Boon + bonus tiers + 90-day retention
  - executive-recruiting-process               # retained search + outcome scorecard + 360 references
  - contractor-to-fte-conversion               # contractor→FTE workflow + classification audit
  - internal-mobility-program                  # Gloat / Eightfold Career Hub + internal job board
  - post-offer-pre-start-check-ins             # renege prevention + pre-boarding + Day-1 handoff
  - background-check-checkr-sterling           # Checkr / Sterling / GoodHire + FCRA compliance
  - technical-interview-karat-codesignal-coderpad # Karat-as-a-service + CodeSignal + CoderPad + HackerRank

  # ── CraftBot defaults (31) — already on recipient's install ───────────
  # Comms (recruiter sends a *lot* of email + Slack + Zoom + Teams):
  - gmail                              # candidate status updates + reference requests + offer letters + decline templates
  - linkedin                           # LinkedIn profile pulls + outreach to passive candidates
  - mailchimp                          # silver-medalist newsletter + boomerang re-engagement + talent community
  - microsoft-teams                    # alt for Teams-shop recipients
  - slack                              # hiring-team channels + debrief async + onboarding handoff to operations-agent

  # Calendar / scheduling fallback (when Goodtime / Ashby / Calendly not configured):
