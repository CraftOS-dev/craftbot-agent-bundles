  - writing-skills                     # offer letter + status update + rejection + reference request prose quality
  - writing-assistant                  # general editing
  - memory-processor                   # persist candidate + role + persona context across sessions

# MCP servers — 2026 SOTA recruiter stack. Each platform MCP backs at
# least one use case from reference/SOTA_USE_CASES.md. Recipient enables
# in CraftBot MCP settings + provides OAuth/API keys per platform.
# (verify.py checks every name exists in app/config/mcp_config.json.)
mcp_servers:
  - filesystem                         # read/edit interview kits, scorecards, offer letters, reference reports

  # ── Comms (status updates + offer letters + reference requests + decline templates) ─
  - gmail-mcp                          # candidate emails + offer letter delivery + reference requests
  - outlook-mcp                        # alt for Outlook-shop recipients
  - google-workspace-mcp               # Gmail + Drive + Calendar + Sheets combined for workspace teams
  - slack-mcp                          # hiring-team channels + debrief async + manager DMs + onboarding handoff
  - ms-teams-mcp                       # alt for Teams-shop recipients
  - zoom-mcp                           # interview scheduling + recording + transcript hand-off

  # ── Calendar / scheduling ────────────────────────────────────────────
  - google-calendar-mcp                # interview holds + 1:1 cadence + pre-start touch base + standups + offer follow-up

  # ── Knowledge base / docs (interview kit + scorecard + intake + debrief + offer playbook) ─
  - notion-mcp                         # interview kits, scorecards, intake docs, debrief notes, offer talking points, rejection templates
  - obsidian-mcp                       # alt local-first KB for sensitive candidate notes

  # ── Task + req pipeline + recruiter-team coordination ────────────────
  - linear-mcp                         # per-req recruiter kanban + recruiter-team task pipeline + onboarding handoff
  - jira-mcp                           # alt PM for Atlassian-shop recipients

  # ── Code / repo (interview kit + hiring policy doc version control) ───
  - github                             # interview kit, hiring policy, recruiter playbook version control

  # ── Finance (referral bonus payout + offer-comp cross-ref) ────────────
  - xero-mcp                           # referral bonus payout coordination + comp band finance reconciliation

  # ── Document storage / signed contracts / data room / interview archive ─
  - google-drive-mcp                   # offer letter + signed contracts + interview kit archive + reference packet

  # ── Research / scrape / OCR (employer brand + comp intel + resume OCR) ─
  - firecrawl-mcp                      # Glassdoor / Comparably / Levels.fyi scrape for free comp intel + brand monitoring
  - brightdata-mcp                     # paid scrape for paywalled comp (Radford) + brand
  - playwright-mcp                     # ATS UI automation + Glassdoor response UI when no API
  - gemini-ocr-mcp                     # résumé OCR for scanned applications + reference letter OCR
  - mistral-ocr-mcp                    # alt OCR engine
  - brave-search                       # current SOTA / news / comp benchmark backstop

  # ── Embedding-based clustering (JD-to-resume + candidate-fit similarity) ─
  - huggingface-mcp                    # JD-to-resume similarity scoring + candidate-fit clustering

  # ── Analytics (candidate-experience survey + outreach A/B) ────────────
  - posthog-mcp                        # candidate-experience NPS survey analytics + outreach A/B

  # ── High-volume SMS comm (RPO-style hiring) ────────────────────────────
  - twilio-mcp                         # SMS for high-volume candidate comm (35-50% reply vs email 5-15%)

  # ── Diagramming (debrief flow + intake state machine + interview process visualization) ─
  - drawio-mcp                         # debrief flow + intake → offer state machine + process visualization
  - figma-mcp                          # career site + offer letter design polish + interview kit cover

