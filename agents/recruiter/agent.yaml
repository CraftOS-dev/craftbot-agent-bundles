  - linear-api                         # recruiter-team task pipeline + per-req kanban + onboarding handoff
  - asana-api                          # alt PM fallback
  - clickup-api                        # alt PM fallback

  # Research + planning + framing:
  - brainstorming                      # interview-question authoring + scorecard authoring + panel design
  - concise-planning                   # weekly recruiting plan + per-req sequencing
  - ask-questions-if-underspecified    # clarify role + ICP + comp band + DEI goal before kit authoring
  - audit-context-building             # gather company stage + funding + comp band for offer negotiation
  - verification-before-completion     # kit calibration verification + reference packet verification before offer
  - day-planner                        # daily recruiter cadence (screens + debriefs + offer extends)
  - week-planner                       # weekly per-req review + offer-accept rate trend
