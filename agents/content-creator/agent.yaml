# Content Creator — CraftBot agent definition
#
# SPECIALIZED TIER (sits under marketing). Deep on multi-format content
# operations: long-form newsletter, podcast scripting + production,
# repurposing pipelines (one-to-many), audiograms, infographics, LinkedIn
# carousels, X threads, content series planning, monetization stack, and
# creator-economy distribution. When user wants "everything marketing"
# instead, defer to marketing-agent. When user wants deep video craft
# (color grading, FFmpeg pipelines, AI video gen), defer to video-creator.
#
# Every field traces back to reference/. See reference/INVENTORY.md for
# sources and reference/SOTA_USE_CASES.md for per-use-case SOTA mapping.

name: Content Creator
slug: content-creator
category: marketing                  # sits under marketing alongside marketing-agent + video-creator
tier: specialized                    # one of: general | specialized
description: >
  Multi-format content operator for newsletters, podcasts, repurposing
  pipelines, and creator-economy distribution. Writes long-form
  newsletters to Beehiiv/Ghost/Substack/Kit; scripts and produces podcasts
  with Castmagic/Descript/Riverside; runs one-to-many repurposing chains
  (1 tentpole → 10+ derived assets); publishes LinkedIn carousels via
  Postiv/Carosello, X threads via Typefully, short-form scripts via
  Submagic; designs monetization stacks across Patreon/Memberstack/Circle.
  Three convictions ground every decision: distribution is 10× more
  important than creation, the format is part of the message, and
  consistency compounds (daily ugly beats sporadic perfect). For broad
  marketing (positioning, SEO, paid ads, email lifecycle) defer to
  marketing-agent; for deep video craft (color/FFmpeg/AI video gen) defer
  to video-creator.
tags:
  - content
  - newsletter
  - podcast
  - repurposing
  - linkedin-carousel
  - twitter-thread
  - audiogram
  - infographic
  - creator-economy
  - monetization
  - content-series
  - cross-platform-publishing

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Capability comes from 21 bundled SOTA skill packs + CraftBot defaults +
# the 2026 SOTA content/podcast/newsletter MCP stack.
# See reference/SOTA_USE_CASES.md for per-use-case SOTA mapping.
enabled_skills:
  # ── Bundled (21) — 2026 SOTA content-creator skill packs ──────────────
  - long-form-newsletter-substack-beehiiv-ghost  # Beehiiv MCP + Ghost Admin API + Kit/ConvertKit API
  - podcast-scripting-show-notes                  # Castmagic MCP + Otter chat + Whisper transcripts
  - podcast-guest-research-outreach               # Podchaser API + Notion pipeline + Gmail outreach
  - podcast-editing-brief-descript-riverside      # Descript API import + Riverside multitrack
  - content-series-multi-format-arcs              # Tentpole + derivative arcs in Notion editorial DB
  - repurposing-pipeline-1-to-10                  # Castmagic + Opus Pro + Submagic + Headliner chain
  - short-form-video-script-reels-shorts-tiktok   # 3-second hook + 40/30/20/10 pillar mix + Submagic
  - linkedin-carousel-authoring                   # Postiv/Carosello/Taplio + Canva MCP fallback
  - twitter-x-thread-authoring                    # Typefully agent CLI + cross-publish cascade
  - audiogram-headliner-wavve                     # Headliner RSS autopilot + ffmpeg waveform fallback
  - infographic-canva-piktochart-visme            # Piktochart AI outline + Canva MCP branded templates
  - creator-collab-brand-partnership-briefing     # Brand brief template + FTC compliance + outreach
  - podcast-sponsorship-integration               # Host-read scripts (4× recall) + DAI placement
  - monetization-patreon-substack-ad-network      # Patreon v2 + Memberstack + Circle stack design
  - newsletter-subscriber-growth                  # Beehiiv referrals/Boosts + Kit tag flows + Ghost paywalls
  - content-analytics-retention-open-rates-chartable # Beehiiv/Spotify/Apple/YouTube/Chartable analytics
  - newsletter-audience-survey                    # Beehiiv polls + Typeform/Tally embedded surveys
  - content-calendar-notion-db                    # Parent/child editorial DB + Buffer cascade
  - ai-ideation-drafting-claude-gpt               # Claude long-context ideation + Vale slop scrub
  - podcast-seo-titles-descriptions-chapters      # `<podcast:chapter>` + Google Key Moments
  - podcast-back-catalog-audit-repromotion        # Top-N evergreen audit + Castmagic + Buffer re-promo

  # ── CraftBot defaults (18) — already on recipient's install ───────────
  # Document output for briefs, scripts, decks, lead magnets.
  - docx                            # Word docs — scripts, briefs, contracts
  - pdf                             # PDF — lead magnets, ebooks, sponsorship decks
  - pptx                            # Decks — pitch, brand-partnership, sponsorship
  - file-format                     # Cross-format conversion (md ↔ html ↔ pdf ↔ docx)
  - file-organizer                  # Content asset organization (per-episode / per-issue)

  # Web + competitive research, content monitoring.
  - playwright-mcp                  # Browse newsletter renders, podcast pages, competitor channels
  - brave-search                    # SEO + competitive newsletter / podcast research
  - duckduckgo-search               # Alt search
  - firecrawl                       # Structured scraping of competitor Substack/Ghost newsletters
  - ai-news-collectors              # Industry trend monitoring for newsletter content

  # Ideation and planning.
  - brainstorming                   # 30-angles ideation, hook variation, thread brainstorm
  - concise-planning                # Editorial calendar, content series arcs
  - ask-questions-if-underspecified # Clarify format/platform/audience before drafting
  - audit-context-building          # Gather brand voice + past performance rigorously

  # Writing tools + slop scrub.
  - writing-skills                  # Anthropic best-practice writing principles
  - writing-assistant               # Long-form composition aid
  - humanize-ai-text                # Strip AI-slop tells (em-dash storms, hedging)

  # Cross-check + tool execution.
  - gemini                          # Second-opinion model for newsletter / podcast script
  - cli-anything                    # Universal verb: run Beehiiv/Ghost/Castmagic/Typefully/ffmpeg/curl

# MCP servers — 2026 SOTA content + podcast + newsletter + creator-economy
# stack. Each platform MCP closes a "draft only, can't publish/analyze" gap.
# Recipient enables in CraftBot MCP settings + adds OAuth/API credentials.
mcp_servers:
  - filesystem                      # Read/edit scripts, episode files, newsletter drafts

  # ── Knowledge base + outreach core ───────────────────────────────────
  - gmail-mcp                       # Guest outreach, brand partner pitches, audience replies
  - notion-mcp                      # Editorial calendar + briefs + monetization dashboard

  # ── Social publishing (replaces "can draft, can't post" gap) ─────────
  - twitter-mcp                     # X publishing (polls / DMs / native); Typefully cascade handles threads
  - insta-business-mcp              # Instagram Reels publishing (podcast clips, audiograms)
  - facebook-mcp-server             # Facebook page (newsletter / podcast promo)
  - tiktok-mcp                      # TikTok organic (short-form repurposed clips)
  - reddit-mcp                      # Reddit publishing + community insight + AMA scheduling

  # ── Video / podcast intelligence + scheduling ────────────────────────
  - youtube-mcp                     # YouTube video upload + scheduling (podcast video, clips); 100/day quota 2026
  - youtube-mcp-transcript          # Competitor podcast transcript pull for benchmarking

  # ── Audio / voice generation ─────────────────────────────────────────
  - elevenlabs-mcp                  # Voice gen for trailers, dubbing, voiceovers, guest sub
  - mcp-tts                         # TTS fallback when ElevenLabs is overkill

  # ── Media processing (audiogram / clip generation) ───────────────────
  - ffmpeg-mcp-advanced             # Audiogram waveform overlay, audio mastering (-14 LUFS), clip cuts
  - mcp-video-converter             # MP4/WebM/MOV cross-format
  - mcp-media-processor             # Higher-level media pipeline

  # ── Visual design / infographics / thumbnails ────────────────────────
  - canva-mcp                       # Branded carousel / infographic / cover templates
  - figma-mcp                       # Design system fidelity + brand-asset access
  - imagegen-mcp                    # AI image gen — newsletter headers, episode artwork
  - stability-ai-mcp                # Alt AI image gen (SD 3.5)

  # ── Web research + competitive scraping ──────────────────────────────
  - firecrawl-mcp                   # Substack stats scrape, newsletter audit, competitor podcast pages
  - brightdata-mcp                  # Paid SERP / web data for deep competitor audit

  # ── Translation (multi-language newsletter / podcast subtitles) ──────
  - deepl-mcp                       # SOTA translation for multi-language editions

  # ── Analytics (closes "limited analytics" gap) ───────────────────────
  - posthog-mcp                     # Newsletter funnel, podcast listen-through cohorts, retention
  - mixpanel-mcp                    # Alt product analytics
  - amplitude-mcp                   # Alt behavioral analytics
  - postgresql-mcp                  # Content warehouse + scheduled analytics alerts

