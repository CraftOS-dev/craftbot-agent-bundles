# Operations Agent — CraftBot agent definition
#
# Every field traces back to reference/SOTA_USE_CASES.md or to a default
# CraftBot capability already shipped on the recipient's install. See
# reference/INVENTORY.md for sources and SOURCES.md for the section→source map.

name: Operations Agent
slug: operations-agent
category: operations
tier: general
description: >
  End-to-end business operations / ops-glue agent for solo founders and small
  ops teams. Owns hiring pipeline (Greenhouse / Ashby / Lever), onboarding +
  offboarding flows, performance reviews + 1:1s, compensation bands, employee
  handbook + PTO policy, vendor evaluation + SaaS spend audit (Vendr / Tropic),
  procurement playbook, internal tool building (Retool / Tooljet / Budibase),
  workflow automation (n8n / Zapier / Make), process documentation (Scribe /
  Tango / Whale), SSO setup (Okta / WorkOS / JumpCloud), device management
  (Iru / Jamf / Intune / Rippling IT), payroll (Gusto / Rippling / Deel),
  PEO/EOR global hiring, travel + expense, business insurance audit, office
  management (Robin / Envoy), business continuity / disaster recovery, vendor
  risk assessment + DPA, internal knowledge base, and runbook authoring. Hard
  rules: documented process beats heroic individual; automation pays for
  itself in months but only if used; vendor lock-in is technical debt with a
  billing schedule. Always defers binding employment-law / vendor-contract
  review to legal-counsel.
tags:
  - operations
  - business-operations
  - hr-ops
  - it-ops
  - people-ops
  - vendor-management
  - procurement
  - workflow-automation
  - internal-tools
  - device-management
  - sso
  - payroll
  - hiring
  - onboarding
  - knowledge-base
  - runbook
  - business-continuity
  - vendor-risk

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills resolved at build time. Build script looks up names in
# agents/operations-agent/skills/ (bundled — Round 2 creates the contents)
# first, then top-level skills/ (CraftBot defaults — already on recipient).
enabled_skills:
  # ── Bundled (22) — SOTA ops skill packs we ship with this agent ─────────
  # Round 2 creates each skills/<name>/SKILL.md.
  - hiring-pipeline-greenhouse-ashby-lever     # ATS recipes: candidate CRUD, pipeline, scorecards
  - onboarding-offboarding-workflows           # Day-1 / Week-1 / 30-60-90 + SCIM provisioning/deprovisioning
  - performance-review-cycle-lattice-15five    # Cycle authoring + 1:1 + calibration + surveys
  - compensation-philosophy-bands              # Bands per role × geo × stage; Pave/Carta Total Comp pulls
  - employee-handbook-policies                 # Handbook + PTO + remote/hybrid + AI usage policy templates
  - vendor-evaluation-negotiation              # TCO matrix; build-vs-buy; counter-letter templates; BATNA
  - saas-spend-audit-vendr-tropic-spendflo     # Spend pull; SSO log cross-ref; duplicate + unused detection
  - procurement-playbook-intake-renewal        # Intake form; approval; contract storage; renewal calendar
  - internal-tools-retool-tooljet-budibase     # Self-host + cloud recipes; component templates; perms
  - workflow-automation-zapier-make-n8n        # n8n self-host docker + workflow JSON; Zapier/Make REST
  - process-documentation-scribe-tango         # Auto-capture; SOP authoring; Trainual training-rollout
  - sso-okta-jumpcloud-workos                  # SAML/SCIM setup; stage-based selection; provisioning rules
  - device-management-kandji-jamf-intune       # MDM blueprints; OS updates; remote wipe; lifecycle hooks
  - payroll-gusto-rippling-deel                # Payroll setup; multi-state nexus; contractor onboarding
  - peo-eor-global-hiring-deel-remote-oyster-gp # Country matrix; entity vs partner; Deel API recipes
  - travel-expense-policy-navan-ramp-brex      # Policy; card setup; auto-reconciliation; expense routing
  - business-insurance-vouch-embroker-newfront # Coverage audit; D&O / E&O / Cyber / EPLI; renewal calendar
  - office-management-robin-envoy              # Desk + room + visitor booking; space analytics
  - business-continuity-disaster-recovery      # BIA + RTO/RPO + cloud backup + tabletop framework
  - vendor-risk-assessment-dpa                 # Questionnaire + SOC 2 review + DPA drafting + data retention
  - internal-knowledge-base-notion-slab-tettra # KB architecture; AI agent setup; cross-tool search
  - runbook-authoring-operational-incident     # Operational + incident runbooks; post-mortem; status page

  # ── CraftBot defaults (28) — already on recipient's install ─────────────
  # Always evaluate (per METHODOLOGY.md default skills audit checklist):
  - cli-anything                               # universal verb for Greenhouse/Ashby/Lever/Rippling/Deel/Okta REST + n8n docker
  - file-format                                # convert SOPs / contracts / handbook between formats
  - file-organizer                             # vendor binder, audit binder, contract archive, BCP plan
  - using-git-worktrees                        # isolated worktree per project (e.g., q2-handbook-rev)

  # Content / comms (ops delivers a lot of docs + emails + intake forms):
  - docx                                       # Handbook, policy, BCP plan, runbook draft, vendor counter-letter
  - pdf                                        # Final handbook PDF, signed offer letter, board-pack ops section
  - pptx                                       # Manager training decks, ops-review board section
  - xlsx                                       # Comp bands, spend audit, BCP RTO/RPO matrix, headcount plan
  - google-sheet                               # Live shared models for team collaboration
  - microsoft-excel                            # Local Excel for sensitive comp work
  - gmail                                      # Vendor outreach, candidate offers, exit interviews
  - notion                                     # Ops wiki, runbook, handbook, intake forms
  - obsidian                                   # Alt local-first notes for sensitive HR drafts
  - markdown-converter                         # Convert docs across formats

  # Research + planning (ops spends substantial time researching vendors + benchmarks):
  - brainstorming                              # Hypothesis generation for process redesign / vendor selection
  - concise-planning                           # Plan cycles, rollouts, audit timelines
  - ask-questions-if-underspecified            # Clarify team size / HRIS / stage / pain points before drafting
  - audit-context-building                     # Gather context before recommending platform changes
  - verification-before-completion             # Tie out before delivering (handbook ACK, SCIM coverage check)
  - playwright-mcp                             # Browser automation for ATS / HRIS UI when no API surface

  # Versioning / collaboration:
  - git-commit                                 # Version-control runbooks, handbook, policy docs
  - github                                     # Provision repo access on hire; runbook PR review

  # Workflow + ops-adjacent:
  - automation-workflows                       # Workflow design patterns (reference for n8n / Zapier / Make)
  - day-planner                                # Personal-ops layer for the ops lead
  - week-planner                               # Weekly ops cadence (renewal review, 1:1 prep, etc.)
  - month-planner                              # Monthly ops review (spend audit, headcount review)

  # Diagramming (org charts, BCP system diagrams, workflow):
  - excalidraw-diagram-generator               # Hand-drawn-feel org charts + BCP system flow

# MCP servers — every name must exist in app/config/mcp_config.json
# (verify.py checks this). The recipient enables each in their MCP settings
# after importing the .craftbot bundle and fills in any required API keys.
mcp_servers:
  - filesystem                                 # always

  # ── Comms (onboarding, ops alerts, runbook surfaces, renewal reminders) ─
  - gmail-mcp                                  # vendor outreach, exit interviews, manager updates
  - outlook-mcp                                # alt for Outlook-shop recipients
  - google-workspace-mcp                       # Gmail + Drive + Docs + Sheets + Calendar in one
  - slack-mcp                                  # onboarding announcements, runbook surfaces, ops alerts
  - ms-teams-mcp                               # alt for Teams-shop recipients
  - discord-mcp                                # alt comms (some startups Discord-first)
  - zoom-mcp                                   # interview scheduling, 1:1s, all-hands

  # ── Calendar / scheduling ─────────────────────────────────────────────
  - google-calendar-mcp                        # 1:1s, renewals, review cycles, onboarding milestones, exit dates

  # ── Knowledge base / wiki / project management ────────────────────────
  - notion-mcp                                 # ops wiki, handbook, runbook, intake forms, policy library, KB
  - obsidian-mcp                               # alt local-first knowledge base
  - linear-mcp                                 # IT support tickets, procurement intake, onboarding checklists
  - jira-mcp                                   # alt PM for Atlassian-shop recipients
  - todoist-mcp                                # personal task list for ops lead

  # ── Code / repo (onboarding + offboarding provisioning) ───────────────
  - github                                     # repo provisioning on hire / deprovisioning on offboard

  # ── Finance / spend cross-reference (SaaS spend audit, vendor invoices) ─
  - xero-mcp                                   # vendor spend pull from accounting GL; payroll mapping
  - stripe-mcp                                 # corporate card data when Stripe Issuing in use
  - postgresql-mcp                             # raw HRIS / accounting DB queries when exposed

  # ── Document storage / data room / contracts ──────────────────────────
  - google-drive-mcp                           # contract storage, data room sections, signed handbook ACKs

  # ── Research / scrape / OCR (vendor pricing, market bands, paper invoices) ─
  - firecrawl-mcp                              # vendor pricing scrape, market band benchmarks
  - brightdata-mcp                             # alt paid scrape for paywalled benchmarks
  - huggingface-mcp                            # HR / ops benchmark dataset discovery
  - gemini-ocr-mcp                             # paper contract / invoice / receipt OCR
  - mistral-ocr-mcp                            # alt OCR engine
  - brave-search                               # current SOTA / market research backstop

  # ── Diagramming (org chart, BCP system flow, workflow visualization) ───
  - drawio-mcp                                 # org chart, BCP system diagrams, workflow visualization
  - figma-mcp                                  # handbook design polish, internal-tool mockups

  # ── Observability / incident (runbook context) ────────────────────────
  - sentry-mcp                                 # incident impact tracking for runbook authoring

  # ── Analytics (internal-tool usage, survey results) ───────────────────
  - posthog-mcp                                # internal-tool usage analytics, employee survey analysis

