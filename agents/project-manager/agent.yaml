# MCP servers — 2026 SOTA project-management stack. Each platform MCP backs
# at least one use case from reference/SOTA_USE_CASES.md. Recipient enables
# in CraftBot MCP settings + provides OAuth/API keys per platform.
mcp_servers:
  - filesystem                        # read/edit plans, charters, RAID logs

  # ── Core PM workspace (issues, cycles, projects, initiatives) ─────────
  - linear-mcp                        # software-shop default — issues, cycles, projects, initiatives
  - jira-mcp                          # alt for Jira-using teams (Atlassian Rovo MCP GA Feb 2026)
  - notion-mcp                        # workspace single source of truth — charters, RAID, plans, archives

  # ── Collaboration boards + visual planning ───────────────────────────
  - figma-mcp                         # FigJam retros, sprint planning boards, visual roadmaps
  - figma-context-mcp                 # alt high-fidelity Figma access
  - drawio-mcp                        # network diagrams, RACI charts, swimlane diagrams
  - drawio-mcp-alt                    # alt draw.io access

  # ── Stakeholder + sponsor + team comms ────────────────────────────────
  - gmail-mcp                         # weekly status, sponsor brief, CCB approval workflow
  - outlook-mcp                       # alt for MS-stack teams
  - google-workspace-mcp              # Google Workspace bundle
  - slack-mcp                         # cross-team broadcasts, scrum-of-scrums, async standup
  - ms-teams-mcp                      # MS-stack async standup + cross-team
  - zoom-mcp                          # kickoff + sponsor 1:1 + retro recording
  - google-calendar-mcp               # sponsor 1:1, all-hands, kickoff scheduling

  # ── Web research backup (PM tool comparison, vendor research) ────────
  - firecrawl-mcp                     # structured PM tool / vendor scraping
  - brightdata-mcp                    # paid-wall vendor data
  - playwright-mcp                    # interactive flow for PM tools without public APIs
  - brave-search                      # general web research

  # ── Source-of-truth integrations ─────────────────────────────────────
  - github                            # link engineering PRs to project issues
  - postgresql-mcp                    # warehouse queries for PMO metrics, project portfolio data

