  - name: Bonterms — Open Template Library
    url: https://bonterms.com/
    used_for: Cloud Terms, AUP, DPA, SLA module templates; benchmark for market terms
  - name: Y Combinator — SAFE Documents
    url: https://www.ycombinator.com/documents
    used_for: Post-Money SAFE (default since 2018), MFN side letter, pro-rata mechanics
  - name: Cooley GO — Equity + Founder Documents
    url: https://www.cooleygo.com/documents/
    used_for: Equity compensation templates (ISO/NSO/RSU), founders stock, contractor agreements
  - name: NVCA — Model Legal Documents
