# Legal Counsel — CraftBot agent definition
#
# Every field traces back to web-sourced SOTA research summarized in
# reference/SOTA_USE_CASES.md (per-use-case mapping) and SOURCES.md
# (section-to-source map). Upstream reference agents have not been
# downloaded in v1; see reference/INVENTORY.md.

name: Legal Counsel
slug: legal-counsel
category: legal
tier: general
description: >
  Senior in-house counsel for solo founders and small teams. Covers contract
  review (MSA / NDA / employment / vendor / SaaS), T&C drafting, IP basics
  (trademark / patent / copyright / DMCA), GDPR / CCPA / SOC2 readiness,
  equity grants (ISO / NSO / RSU / 83(b)), SAFE / convertible-note review,
  and term-sheet analysis. Operates on the load-bearing conviction that it
  is NOT the final lawyer — every binding output carries a consult-an-attorney
  disclaimer. Defers to licensed counsel for anything that will be signed,
  filed, or executed.

tags:
  - legal
  - contracts
  - nda
  - msa
  - privacy
  - gdpr
  - ccpa
  - soc2
  - trademark
  - patent
  - equity
  - safe
  - term-sheet
  - compliance
  - ip
  - open-source-licensing

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills are resolved at build time:
#   1. agents/legal-counsel/skills/<name>/  (bundled — ships INSIDE the .craftbot)
#   2. <repo>/skills/<name>/                (CraftBot default — already on recipient's install)
#   A missing skill (in neither location) causes a build error.
enabled_skills:
  # ── Bundled (20) — SOTA legal skill packs we ship with this agent ──────
  # Round 2 will populate each folder under agents/legal-counsel/skills/<name>/
  # with a SKILL.md. The names below are reserved and referenced from soul.md
  # / role.md / SOTA_USE_CASES.md.
  - contract-review-msa-nda-employment              # MSA / NDA / employment / contractor / vendor playbook
  - robin-spellbook-harvey-ai-contract-review       # AI-assisted contract review (Robin AI, Spellbook, Harvey)
  - terms-of-service-tos-drafting                   # Customer T&C, marketplace ToS, AUP
  - privacy-policy-gdpr-ccpa                        # Privacy policy across jurisdictions
  - iubenda-termly-privacy-policy-generators        # Iubenda + Termly auto-generators
  - cookie-consent-management-cookiebot-onetrust    # Cookiebot, OneTrust, Iubenda Cookie Solution
  - gdpr-readiness-audit                            # Art. 6 lawful basis, DPIA, SAR/DSAR, ROPA, DPO
  - ccpa-cpra-readiness-audit                       # CCPA / CPRA + Cal AG enforcement focus
  - drata-vanta-secureframe-soc2-readiness          # SOC2 Type I / II prep, AICPA TSP 100
  - dpa-data-processing-agreement                   # GDPR Art. 28 DPA + EU SCC drafting
  - trademark-search-uspto-tess-wipo                # USPTO TESS + WIPO + Trademarkia clearance + filing prep
  - patent-search-uspto-lens-google                 # USPTO PPS + Google Patents + Lens.org prior-art search
  - equity-grants-isos-rsus-83b-election            # ISOs, NSOs, RSUs, 409A FMV, 83(b) election prep
  - safe-convertible-note-yc-template               # YC Post-Money SAFE + convertible-note review
  - term-sheet-review-series-a-typical-terms        # NVCA model + market-deviation memo
  - founders-agreement-vesting-ip-assignment        # 4-yr/1-yr vesting, single/double trigger, IP assignment
  - open-source-license-mit-apache-gpl-agpl         # SPDX + OSS Review Toolkit + SBOM + obligation memo
  - dmca-takedown-process                           # 17 USC §512 notice + counter-notice + DMCA agent
  - ironclad-contractworks-clm                      # CLM platform workflows (Ironclad, ContractWorks, Lexion)
  - non-compete-non-solicit-state-enforceability    # State-by-state map + FTC rule status

  # ── CraftBot defaults (16) — already on recipient's install ────────────
  # Document I/O, file ops, research, writing assistance, review discipline.
  - cli-anything                                    # universal verb — install Robin AI CLI, Spellbook, Iubenda exporters, OSS Review Toolkit, curl regulator pages
  - file-format                                     # convert .docx / .pdf / .md / .txt for contract intake
  - file-organizer                                  # organize a workspace of contracts, redlines, audit reports
  - docx                                            # produce Word output (default for contracts + memos)
  - pdf                                             # produce PDF for signature pipelines
  - pptx                                            # produce slide decks for board / investor compliance briefs
  - markdown-converter                              # cross-convert markdown for memos + redlines
  - writing-skills                                  # general writing discipline for memos + summaries
  - writing-plans                                   # structured drafting plans for long-form contracts
  - writing-assistant                               # collaborative drafting flow
  - brainstorming                                   # use-case exploration before clause drafting
  - concise-planning                                # plan multi-step compliance audits
  - research-assistant                              # case + statute + secondary-source research
  - web-search-plus                                 # broad regulator + comparison-blog search
  - tavily-search                                   # high-quality search for legal source material
  - firecrawl                                       # scrape regulator pages (FTC, ICO, EDPB, USPTO, HHS)
  - verification-before-completion                  # quality-gate every memo / contract before delivery
  - prompt-engineering-expert                       # structure prompts to Robin AI / Spellbook / Harvey
  - github                                          # OSS license compliance scans against user's repos
  - github-api                                      # raw GitHub API for SBOM + dependency-license queries
  - using-git-worktrees                             # isolate contract-review branches in versioned doc repos
  - differential-review                             # structured review of contract redlines / audit PRs

# MCP servers — every name verified against app/config/mcp_config.json.
# The recipient enables each in MCP settings after import and fills in any
# required API keys.
mcp_servers:
  - filesystem                                      # read/edit contracts, redlines, audit reports
  - sec-edgar-mcp                                   # public-company contract precedent search, SEC enforcement actions
  - uspto-mcp                                       # trademark TESS + patent search direct queries
  - firecrawl-mcp                                   # fetch frequently-changing regulator pages (FTC, ICO, EDPB)
  - gemini-ocr-mcp                                  # extract text from scanned contracts, image-only legal exhibits
  - mistral-ocr-mcp                                 # alt OCR for redundancy
  - notion-mcp                                      # write memos / audit reports into user's workspace
  - gmail-mcp                                       # send draft contracts to counterparties; collect signed copies
  - google-drive-mcp                                # read/write contract drafts in user's drive
  - google-workspace-mcp                            # Docs + Sheets for cap-table modeling
  - deepl-mcp                                       # translate multi-jurisdiction contracts (EU + US)
  - github                                          # OSS license compliance scans

# Source attribution. See SOURCES.md for section→source map. See
# reference/INVENTORY.md for the per-file URL + license + description.
sources:
