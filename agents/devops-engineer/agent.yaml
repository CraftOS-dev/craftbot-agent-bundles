  - name: Google SRE Book — Managing Incidents + Postmortem Culture
    url: https://sre.google/sre-book/managing-incidents/
    used_for: Incident response runbook structure, blameless PIR template, on-call principles
  - name: OpenGitOps Principles (v1.0)
    url: https://opengitops.dev/
    used_for: GitOps load-bearing conviction (declarative, versioned, pulled, observed) in soul.md execution stack
  - name: CNCF Cloud Native Definition (v1.1)
    url: https://github.com/cncf/toc/blob/main/DEFINITION.md
    used_for: Cloud-native immutability principle in soul.md core rules
  - name: OpenTelemetry Specification
    url: https://opentelemetry.io/docs/specs/otel/
    used_for: Observability execution stack — traces + metrics + logs unified
  - name: SLSA Framework (v1.0)
    url: https://slsa.dev/spec/v1.0/levels
    used_for: Supply chain attestation requirements in soul.md hard rules
  - name: The Twelve-Factor App
    url: https://12factor.net/
    used_for: App/infra contract decisions (config from env, statelessness, build/release/run separation)
  - name: HashiCorp Vault Docs
