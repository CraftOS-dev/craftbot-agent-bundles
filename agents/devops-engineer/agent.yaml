# DevOps Engineer — CraftBot agent definition
#
# Every field in this file traces back to a SOTA row in
# reference/SOTA_USE_CASES.md or to a default CraftBot capability already
# shipped in the recipient's install. See reference/INVENTORY.md for sources.

name: DevOps Engineer
slug: devops-engineer
category: infra
tier: specialized            # one of: general | specialized — infra specialist sibling to senior-python-engineer
description: >
  Senior platform / infra engineer with 10-year-experience-level command of
  Docker, Kubernetes, Terraform/OpenTofu, Pulumi, GitOps (ArgoCD/Flux), CI/CD
  (GitHub Actions OIDC), observability (OpenTelemetry + Honeycomb/Datadog or
  self-hosted Prometheus + Grafana + Loki + Tempo + Mimir), incident response,
  SLOs + error budgets, secrets management (Vault + External Secrets Operator),
  container security (Trivy + Cosign + SLSA), and FinOps (Infracost + OpenCost).
  Distinct from `senior-python-engineer` (app code) — defer there for
  language-specific issues. Distinct from `frontend-engineer` (web build/deploy
  specifics). Distinct from `data-analyst` (warehouse-specific tuning). Distinct
  from `customer-support-agent` (customer-facing incident comms).
  Load-bearing convictions: (1) immutability over mutation — rebuild, don't
  patch; (2) observability is non-negotiable — if you can't see it, you can't
  operate it; (3) toil is a bug — automate every repeat-task.
tags:
  - devops
  - sre
  - kubernetes
  - terraform
  - opentofu
  - pulumi
  - argocd
  - gitops
  - ci-cd
  - observability
  - opentelemetry
  - incident-response
  - slos
  - secrets-management
  - supply-chain-security
  - finops

model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills are resolved at build time. The build script looks up each name in
# agents/devops-engineer/skills/ (bundled — ships INSIDE the .craftbot) first,
# then in the repo's top-level skills/ (default — already on the recipient's
# CraftBot install).
enabled_skills:
  # ── Bundled (22) — SOTA DevOps skill packs we ship with this agent ──────
  # Round 2 creates the actual SKILL.md folders under
  # agents/devops-engineer/skills/<name>/. See reference/SOTA_USE_CASES.md
  # for the per-use-case mapping.
  - docker-multistage-buildkit-distroless        # Multi-stage Dockerfile + BuildKit cache + Chainguard/distroless
  - kubernetes-deployments-helm-kustomize        # Deployment/Service/Ingress/HPA/PDB + Helm 3 + Kustomize overlays
  - terraform-opentofu-iac                       # OpenTofu 1.8 / Terraform 1.9 + tflint + checkov + infracost
  - pulumi-iac-python-typescript                 # Pulumi 3.x + Pulumi ESC for secrets/config
  - aws-cdk-sst-serverless                       # AWS CDK 2.x + SST v3 + SAM
  - github-actions-cicd-oidc                     # OIDC + reusable workflows + matrix + actionlint + act
  - argocd-flux-gitops                           # ArgoCD App-of-Apps + Flux v2 + ApplicationSets + image-updater
  - vault-doppler-pulumi-esc-secrets             # Vault/OpenBao + Doppler + Pulumi ESC + Infisical
  - external-secrets-operator-k8s                # ESO + SecretStore / ClusterSecretStore / ExternalSecret CRDs
  - opentelemetry-instrumentation                # OTel SDK + Collector + auto-instrumentation + semantic conventions
  - honeycomb-datadog-observability              # Backend-specific recipes for Honeycomb / Datadog / Grafana Cloud
  - prometheus-grafana-loki-tempo-self-hosted    # kube-prometheus-stack + Loki + Tempo + Mimir + Vector
  - slos-error-budgets-google-sre                # Sloth / Pyrra / multi-window multi-burn-rate alerts
  - pagerduty-incident-io-incident-response      # Paging + war-room + PIR (PagerDuty/Opsgenie/Incident.io/Rootly)
  - blue-green-canary-argo-rollouts              # Argo Rollouts blueGreen + canary + AnalysisTemplate
  - feature-flags-launchdarkly-statsig           # OpenFeature SDK + LaunchDarkly/Statsig/Unleash backends
  - trivy-snyk-container-scanning                # Trivy + Snyk + Grype + image policy
  - sigstore-slsa-supply-chain-attestation       # Cosign + Fulcio + Rekor + Syft + SLSA + in-toto
  - cloudflare-vercel-railway-fly-render-paas    # Modern PaaS deployment patterns
  - cost-optimization-finops-infracost           # Infracost + OpenCost + Karpenter + Goldilocks + FinOps framework
  - cert-manager-acme-tls                        # cert-manager + Let's Encrypt + step-ca + trust-manager
  - backstage-developer-portal                   # Spotify Backstage IDP + Software Catalog + Tech Docs + Templates

  # ── CraftBot defaults (13) — already on recipient's install ────────────
  # These give the agent hands: run CLIs, do git, talk to GitHub, debug, draft
  # runbooks, isolate work in worktrees.
  - cli-anything                                  # universal verb: kubectl, helm, terraform, tofu, pulumi, docker, gh, cosign, syft, trivy, k6, vault, argocd, flux, infracost — anything
  - file-format                                   # YAML / JSON / TOML formatting and conversion for manifests
  - file-organizer                                # manage runbooks/, manifests/, terraform/, charts/ tree
  - using-git-worktrees                           # isolate IaC changes in worktrees before merging to main
  - git-commit                                    # conventional commits + signed commits for IaC repos
  - github                                        # gh CLI — workflows, PRs, releases, deployments, environments
  - github-api                                    # raw GitHub API for fine-grained queries (matrix logs, OIDC config)
  - debug-pro                                     # 7-step debugging methodology — used during incidents
  - systematic-debugging                          # generic root-cause method before proposing any fix
  - test-driven-development                       # for IaC: write contract test (e.g., terratest) before infra change
  - differential-review                           # structured PR review workflow for IaC changes
  - requesting-code-review                        # checklist before asking for review on IaC PRs
  - receiving-code-review                         # rigor when applying review feedback

# MCP servers — every name must exist in app/config/mcp_config.json
# (verify.py checks this). The recipient enables each in their MCP settings
# after importing the .craftbot bundle and fills in any required API keys.
mcp_servers:
  - filesystem                                    # read/edit IaC code, manifests, runbooks, helm values, kustomization.yaml
  - kubernetes-mcp                                # apply manifests, describe pods, get logs, rollout status — 14 of 36 use cases
  - github                                        # PRs, workflow runs, releases, environments — 8 of 36 use cases
  - aws-s3-mcp                                    # DR backup storage, log archives, OCI image storage, terraform state
  - cloudflare-mcp                                # DNS, CDN, Workers, Pages, Zero-Trust tunnels
  - sentry-mcp                                    # production error correlation during incident response
  - postgresql-mcp                                # DB migration coordination (Atlas/Liquibase) — zero-downtime parallel-change
  - splunk-mcp                                    # log search for orgs running Splunk (alt to Loki/Datadog)

# Source attribution. Reference material for soul.md / role.md is listed here
# for one-glance verification. Default skill/MCP picks are documented in
# comments above. See SOURCES.md for the section→source map and
# reference/SOTA_USE_CASES.md for the per-use-case SOTA mapping.
