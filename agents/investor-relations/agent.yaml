model:
  llm_provider: anthropic
  llm_model: claude-sonnet-4-5-20250929

# Skills resolved at build time. Build script looks up names in
# agents/investor-relations/skills/ (bundled — Round 2 enriches the contents)
# first, then top-level skills/ (CraftBot defaults — already on recipient).
enabled_skills:
  # ── Bundled (20) — SOTA IR skill packs we ship with this agent ───────────
  # Round 2 enriches each skills/<name>/SKILL.md.
  - monthly-investor-update-visible              # Visible.vc Standard template; private-co cadence
  - quarterly-board-letter                       # Quarterly + annual shareholder letter
  - earnings-call-script-qa                      # Script + 50-150 Q&A pack; AlphaSense pattern mining
  - 10k-10q-drafting-workiva                     # Workiva + SEC EDGAR Next 2025 protocol
  - 8k-event-reporting                           # 4-business-day trigger; Item 1.01/2.02/5.02/7.01/8.01
  - proxy-statement-drafting                     # DEF 14A + pay-versus-performance Item 402(v); ISS + Glass Lewis
  - equity-analyst-relations-briefings           # AlphaSense + Sentieo + Tegus; coverage matrix
  - ir-website-q4-notified                       # Q4 Inc. + Notified; events + filings + ESG hub
  - roadshow-ndr-logistics                       # Sell-side corporate access + IPO mgmt roadshow
  - quarterly-earnings-press-release             # Boilerplate + Reg G reconciliation + Notified/BW dist
  - guidance-setting                             # FactSet/Refinitiv consensus; range vs point; under-promise+
  - 13f-shareholder-monitoring                   # Whale Wisdom + 13F Info + SEC EDGAR XBRL
  - shareholder-qa-maintenance                   # Q&A library (100-300 entries); Notion / Coda
  - esg-investor-reporting-gri-sasb-tcfd         # IFRS S1/S2 + GRI 2025 + TCFD; Workiva ESG
  - investor-day-capital-markets-day             # Annual deep-dive; Notified / Q4 hybrid
  - quiet-period-mgmt                            # ~2-wk lockout; outbound auto-reply; calendar block-out
  - embargoed-disclosure-protocols               # NDA + embargo timing + Reg FD audit trail
  - ma-investor-comms                            # Joele Frank / Sard / FTI playbook
  - fund-of-funds-lp-reporting                   # ILPA 3.0 + Allvue + Carta LP + Visible LP
  - dividend-buyback-secondary-comms             # 10b5-1 + 8-K + Business Wire

  # ── CraftBot defaults (24) — already on recipient's install ─────────────
  # Always evaluate (per METHODOLOGY.md default skills audit checklist):
  - cli-anything                            # universal verb for Visible.vc/Q4/Notified/AlphaSense/Workiva REST
  - file-format                             # convert decks / letters / press releases between formats
  - file-organizer                          # organize data rooms + earnings binders
  - using-git-worktrees                     # isolated worktree per workstream (e.g., Q1-earnings)

  # Content / comms (IR ships a lot of letters + decks + press releases + memos):
  - docx                                    # investor letters, earnings press releases, 10-K narrative
  - pdf                                     # investor letter PDFs, deck PDFs, data-room PDF assets
  - pptx                                    # earnings deck, capital markets day, roadshow deck
  - xlsx                                    # 13F tracking, consensus comparison, KPI scorecards
  - google-sheet                            # live shared models for IR/finance/exec collab
  - microsoft-excel                         # local Excel for sensitive guidance / M&A work
  - google-slides                           # alt for live shared decks
  - gmail                                   # investor distribution, analyst correspondence
  - outlook                                 # alt for Outlook-side audiences
  - notion                                  # IR CRM + Q&A library + holder tracking + Reg FD audit trail
  - obsidian                                # alt local-first for sensitive M&A / IPO drafts
  - slack                                   # IR + finance + legal + ceo internal comms

  # Existing finance defaults that ship (IR consumes them):
  - stock-forecast                          # peer / market read for analyst Q&A prep
  - stock-market-pro                        # alt market data layer
  - writing-skills                          # investor-letter craft, CEO-voice writing
  - writing-assistant                       # alt drafting

  # Research + planning (IR spends substantial time researching + planning):
  - brainstorming                           # Q&A anticipation, capital markets day theme generation
  - concise-planning                        # Plan earnings prep / investor day / roadshow timelines
  - ask-questions-if-underspecified         # Clarify public/private + investor count + horizon before drafting
  - audit-context-building                  # Rigorous context-gathering before strategic IR memo
  - verification-before-completion          # Tie out numbers + tone + disclosures before delivering

  # Versioning / collaboration:
  - git-commit                              # Version-control earnings binders + IR playbooks
  - markdown-converter                      # Convert IR docs across formats

# MCP servers — every name must exist in app/config/mcp_config.json
# (verify.py checks this). The recipient enables each in their MCP settings
# after importing the .craftbot bundle and fills in any required API keys.
mcp_servers:
  - filesystem                              # always

  # ── SEC filings + public-market research (heavy use for this agent) ────
  - sec-edgar-mcp                           # 10-K/10-Q/8-K/13F/13D/G/DEF 14A/S-1 fetch; peer comp; shareholder ID
  - octagon-sec-mcp                         # alt SEC research / private-market comparables
  - yahoo-finance-mcp                       # public-comp stock data + consensus + analyst estimates
  - alpha-vantage-mcp                       # alt market data
  - mcp-finance                             # multi-source finance data aggregator
  - tradingview-mcp                         # public-comp charting + technicals

  # ── Investor + audience comms ─────────────────────────────────────────
  - gmail-mcp                               # investor distribution blasts when no Visible.vc / Q4
  - outlook-mcp                             # alt for Outlook-side investors
  - google-workspace-mcp                    # Gmail + Calendar + Drive bundled
  - google-calendar-mcp                     # analyst 1:1 + roadshow + quiet-period block-out
  - ms-teams-mcp                            # virtual investor day / earnings call backup
  - slack-mcp                               # IR + finance + legal + ceo internal coordination

  # ── IR CRM + Q&A library + audit trail ────────────────────────────────
  - notion-mcp                              # IR CRM + Q&A library + holder tracking + Reg FD audit trail

  # ── Research / scrape / OCR (analyst notes, peer IR pages, legacy filings) ──
  - firecrawl-mcp                           # competitor IR-page benchmarking + news monitoring
  - brightdata-mcp                          # paid scrape for institutional holder enrichment + competitor IR
  - playwright-mcp                          # IR website QA (broken-link / load-time / accessibility)
  - huggingface-mcp                         # ESG benchmark datasets + sentiment models
  - gemini-ocr-mcp                          # scan legacy filings + analyst notes
  - mistral-ocr-mcp                         # alt OCR engine

  # ── Web traffic + portal analytics ────────────────────────────────────
  - posthog-mcp                             # IR website + investor portal engagement analytics
  - mixpanel-mcp                            # alt analytics
  - amplitude-mcp                           # alt behavioral analytics

  # ── Retail-investor + analyst sentiment (public co) ───────────────────
  - reddit-mcp                              # r/wallstreetbets, r/Stocks, r/Investing sentiment
  - twitter-mcp                             # fintwit + analyst-handle monitoring

  # ── IR ops backlog + deck design coordination ──────────────────────────
  - linear-mcp                              # IR ops backlog + earnings prep tracker
  - figma-mcp                               # investor day + earnings deck design coordination

